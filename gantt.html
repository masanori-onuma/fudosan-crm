<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>リフォーム工程表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;background:#f5f5f5;color:#111}
header{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
header h1{font-size:15px;font-weight:600;color:#0C447C}
header a{font-size:12px;color:#888;text-decoration:none;margin-left:auto}
header a:hover{color:#185FA5}
.container{padding:10px 16px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 0 8px;border-bottom:1px solid #ddd;margin-bottom:8px}
.toolbar label{font-size:12px;color:#888}
.toolbar input[type=date]{font-size:12px;height:30px;padding:0 6px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111}
.btn{height:28px;padding:0 12px;font-size:12px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.btn:hover{background:#f0f0f0}
.btn-sm{height:22px;padding:0 7px;font-size:11px}
.btn-primary{background:#e6f1fb;color:#185FA5;border-color:#85B7EB}
.btn-danger{color:#c00;border-color:#ecc}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 0 8px;border-bottom:1px solid #ddd;margin-bottom:8px}
.filter-bar label{font-size:11px;color:#888}
.filter-bar select{font-size:11px;height:26px;padding:0 6px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;min-width:110px}
.gantt-outer{border:1px solid #ccc;border-radius:8px;background:#fff}
.gantt-scroll{overflow-x:auto;overflow-y:auto;max-height:75vh;touch-action:pan-x pan-y}
table{border-collapse:collapse;min-width:100%;font-size:12px;table-layout:fixed}
.col-info{width:300px;min-width:300px;max-width:300px;position:sticky;left:0;z-index:10;touch-action:pan-y}
.day-col{width:26px;min-width:26px}
thead{position:sticky;top:0;z-index:25}
thead th{position:sticky;top:0;z-index:20;background:#f0f0ee;border-bottom:1px solid #bbb;border-right:1px solid #ddd;padding:2px 0;text-align:center;font-weight:500;color:#555;white-space:nowrap}
thead th.col-info{z-index:30;text-align:left;padding:0 8px;font-size:12px}
thead th.wk{color:#E24B4A}
thead th.tod{font-weight:700;background:#1D9E75!important;color:#fff!important;position:relative}
thead th.tod::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:#0e7a5a}
/* 物件ゼブラ(PC/スマホ共通) - 完了済み行も含めて同じ色の帯にする */
tr.site-group-even td,tr.site-group-even.row-proc.done td,tr.site-group-even.row-proc.done td.day-cell{background:#eef2f6!important}
tr.site-group-even td.wk-cell,tr.site-group-even.row-proc.done td.day-cell.wk-cell{background:#dfe6ed!important}
tr.site-group-odd td,tr.site-group-odd.row-proc.done td,tr.site-group-odd.row-proc.done td.day-cell{background:#ffffff!important}
tr.site-group-odd td.wk-cell,tr.site-group-odd.row-proc.done td.day-cell.wk-cell{background:#f0f0f0!important}
tr.site-group-even td.tod-cell,tr.site-group-odd td.tod-cell{background:rgba(50,180,100,0.12)!important}
tr.site-group-even.row-proc.done td.tod-cell,tr.site-group-odd.row-proc.done td.tod-cell{background:rgba(50,180,100,0.15)!important}
tr.row-site td{background:#f5f5f5}
tr.row-proc td{background:#fff}
tr.row-proc.done td{background:#f5f5f3}
tr.row-proc.done td.tod-cell{background:rgba(50,180,100,0.25)!important}
tr.row-proc.done td.day-cell{background:#fff!important}
tr.row-proc.done td.day-cell.wk-cell{background:#f5f5f2!important}
tr.row-proc.done td.day-cell.tod-cell{background:rgba(50,180,100,0.15)!important}
tr.row-kouki td{background:#f9f5ee}
tr.row-kouki td.wk-cell{background:#f4eedf}
tr.row-site td.wk-cell{background:#e8e8e8}
tr.row-proc td.wk-cell{background:#f5f5f2}
td.tod-cell{background:rgba(50,180,100,0.15)!important}
.badge-warn{font-size:10px;background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;border-radius:10px;padding:1px 6px;font-weight:600;flex-shrink:0}
.badge-procwarn{font-size:10px;background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;border-radius:10px;padding:1px 6px;font-weight:600;flex-shrink:0}
tr.site-warn td{background:#fff5f5!important}
tr.site-warn td.wk-cell{background:#ffe8e8!important}
tr.site-warn td.tod-cell{background:rgba(50,180,100,0.15)!important}
tr.site-warn .col-info{border-left:3px solid #E24B4A!important}
tr.proc-warn td{background:#fff5f5!important}
tr.proc-warn td.wk-cell{background:#ffe8e8!important}
tr.proc-warn td.tod-cell{background:rgba(50,180,100,0.15)!important}
tr.proc-warn .col-info{border-left:3px solid #E24B4A!important}
.sort-handle{font-size:15px;color:#aaa;cursor:grab;flex-shrink:0;padding:4px 5px;user-select:none;line-height:1;border-radius:3px;transition:background 0.12s}
.sort-handle:hover{color:#444;background:#e8f0fa}
.sort-handle:active{cursor:grabbing}
.sort-handle-site{font-size:16px;color:#7aabcf;cursor:grab;flex-shrink:0;padding:4px 5px;user-select:none;line-height:1;border-radius:3px;transition:background 0.12s}
.sort-handle-site:hover{color:#185FA5;background:#e8f0fa}
.sort-handle-site:active{cursor:grabbing}
tr.row-proc.sort-dragging td{background:#e8f4ff!important;opacity:0.5}
tr.row-proc.sort-over td{border-top:2px solid #185FA5!important}
tr.row-site.site-dragging td{background:#c5d9ed!important;opacity:0.5}
tr.row-site.site-drag-over td{border-top:2px solid #0C447C!important}
td{padding:0;border-bottom:1px solid #ddd;border-right:1px solid #e8e8e8;vertical-align:middle;overflow:hidden}
td.col-info{border-right:1px solid #bbb;padding:0;touch-action:pan-y}
td.day-cell{width:26px;min-width:26px;padding:0;position:relative;touch-action:pan-x pan-y}
td.day-cell.drag-over{background:rgba(74,144,217,0.15)!important}
.site-inner{display:flex;flex-direction:column;justify-content:center;padding:0 6px 0 4px;height:100%;gap:1px;touch-action:pan-y}
.site-top{display:flex;align-items:center;gap:3px;line-height:1}
.toggle{cursor:pointer;font-size:12px;color:#555;user-select:none;flex-shrink:0;width:14px;text-align:center}
.site-name{font-weight:600;color:#0C447C;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;cursor:pointer}
.site-sub{font-size:10px;color:#185FA5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:16px}
.badge-nd{font-size:10px;background:#FAEEDA;color:#854F0B;border-radius:10px;padding:1px 5px;flex-shrink:0}
.proc-inner{display:flex;align-items:center;gap:4px;padding:0 4px 0 8px;height:100%;overflow:hidden;touch-action:pan-y}
.chk{width:22px;height:22px;border-radius:4px;border:1.5px solid #bbb;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;touch-action:manipulation}
.chk.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.proc-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proc-name.done{color:#aaa}
.badge-nodate{font-size:10px;background:#FAEEDA;color:#854F0B;border-radius:10px;padding:0 5px;flex-shrink:0}
.proc-meta{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.field input,.field select{width:100%;font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #ccc}
.field input:focus,.field select:focus{outline:none;border-color:#85B7EB}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.color-palette{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0}
.color-swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#333;transform:scale(1.15)}

.master-section{margin-bottom:14px}
.master-section h4{font-size:12px;font-weight:600;color:#555;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}
.master-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;margin-bottom:6px}
.master-item{display:flex;align-items:center;gap:6px;font-size:12px}
.master-item span{flex:1}
.master-item button{height:20px;padding:0 6px;font-size:10px;border-radius:4px;border:1px solid #ecc;background:#fff;color:#c00;cursor:pointer}
.master-add{display:flex;gap:6px}
.master-add input{flex:1;font-size:12px;padding:4px 6px;border-radius:6px;border:1px solid #ccc;height:28px}
.master-add button{height:28px;padding:0 10px;font-size:12px;border-radius:6px;border:1px solid #85B7EB;background:#e6f1fb;color:#185FA5;cursor:pointer;white-space:nowrap}

/* === 親工程と子項目の階層表示 === */
/* 子項目を持つ親行：左に色バーを付けて強調 */
tr.row-proc.row-parent td.col-info{
  background:linear-gradient(to right,#eef3fa 0,#eef3fa 4px,#fff 4px);
  border-left:none;
  /* position:stickyは.col-infoで設定済み。上書きしない */
}
tr.row-proc.row-parent td.col-info::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:#4A90D9;
}
tr.row-proc.row-parent .proc-name{
  font-weight:600;color:#0C447C;font-size:12.5px;
}
tr.row-proc.row-parent.done .proc-name{color:#888}
tr.row-proc.row-parent.done td.col-info::before{background:#999}

/* 子項目行：背景を薄い灰色＋左インデント＋縦線でツリー感 */
tr.row-child td.col-info{
  background:#f7f9fb;
  /* position:stickyは.col-infoで設定済み。上書きしない */
}
tr.row-child td{
  border-bottom:1px solid #d0d7e0;
}
tr.row-child td.col-info::before{
  content:'';position:absolute;left:30px;top:0;bottom:0;width:2px;
  background:#cfd9e5;
}
tr.row-child td.col-info::after{
  content:'';position:absolute;left:30px;top:10px;width:14px;height:2px;
  background:#cfd9e5;
}
/* 最後の子行の縦線を途中まで（LastChildクラスで明示） */
tr.row-child-last td.col-info::before{
  bottom:auto;height:11px;
}
/* 最後の子行の下境界線は濃く（次が親工程になるので区切りを強調） */
tr.row-child-last td{
  border-bottom:1px solid #b8c2cc;
}
/* 子行の文字サイズを明示的に小さく */
tr.row-child .proc-inner > span[style*="font-size:11px"]{
  color:#555;
}

/* 子行の day-cell にも薄い区別 */
tr.row-child td.day-cell:not(.wk-cell):not(.tod-cell){
  background:#fafbfd;
}


</style>
</head>
<body>
<header>
  <h1>リフォーム工程表</h1>
  <span id="syncStatus" style="font-size:11px;color:#888;white-space:nowrap;margin-left:auto"></span>
  <span id="undoMsg" style="font-size:11px;color:#555"></span>
  <button id="undoBtn" class="btn btn-sm" onclick="undoLast()" disabled title="元に戻す">↩</button>
  <button class="btn btn-sm btn-primary" onclick="scrollToToday()" title="今日の列へ移動">今日</button>
  <button class="btn btn-sm" onclick="openMasterModal()">⚙ マスター</button>
</header>
<div class="container">
  <div class="toolbar">
    <label>表示開始</label><input type="date" id="startDate">
    <label>終了</label><input type="date" id="endDate">
    <button class="btn" onclick="applyRange()">適用</button>
    <button class="btn btn-primary sp-hide" onclick="openSiteModal(null)">＋ 物件追加</button>
    <button class="btn sp-hide" onclick="exportCSV()">CSV出力</button>
    <button class="btn sp-hide" onclick="exportJSON()" title="全データをJSONファイルとして保存">💾 バックアップ</button>
    <button class="btn sp-hide" onclick="importJSON()" title="JSONバックアップから復元">📂 復元</button>
    <button class="btn sp-hide" onclick="openArchiveView()" title="アーカイブ済み物件を閲覧">📦 アーカイブ閲覧</button>
  </div>
  <div class="filter-bar">
    <label>元受</label><select id="filterClient" onchange="render()"><option value="">すべて</option></select>
    <label>担当者</label><select id="filterPerson" onchange="render()"><option value="">すべて</option></select>
    <button class="btn btn-sm" onclick="clearFilters()">リセット</button>
    <span class="sp-hide" style="margin-left:8px;border-left:1px solid #ddd;padding-left:12px;display:flex;align-items:center;gap:6px">
      <label style="color:#c0392b;font-weight:500">⚠ 完成</label>
      <input type="number" id="warnDays" value="3" min="1" max="30" style="width:48px;height:26px;font-size:12px;border:1px solid #ccc;border-radius:6px;padding:0 6px;text-align:center" onchange="render()">
      <label style="color:#c0392b">日以内で未発注工程あり</label>
    </span>
  </div>
  <div class="gantt-outer">
    <div class="gantt-scroll" id="ganttScroll">
      <table id="ganttTable"><thead id="ganttHead"></thead><tbody id="ganttBody"></tbody></table>
    </div>
  </div>
</div>
<div id="modalEl"></div>

<script>
const PC=['#4A90D9','#27AE60','#E74C3C','#8E44AD','#E67E22','#16A085','#2980B9','#7F8C8D',
  '#F39C12','#1ABC9C','#C0392B','#9B59B6','#2ECC71','#E91E63','#00BCD4','#FF5722',
  '#607D8B','#795548','#3F51B5','#009688',
  '#F5A623','#D0021B','#417505','#BD10E0','#9013FE','#4A4A4A','#B8860B','#5C85D6',
  '#E8D5A3','#A8D5A2','#FFFF00','#FFD700','#FFF176','#ffffff','#f0f0f0','#cccccc','#888888','#333333','#000000'];
const CNAMES=['青','緑','赤','紫','オレンジ','深緑','水色','グレー',
  '黄','エメラルド','濃赤','薄紫','ライム','ピンク','シアン','朱',
  'スレート','ブラウン','インディゴ','ティール',
  '山吹','深紅','深緑2','明紫','濃紫','炭','金茶','コバルト',
  'クリーム','薄緑','黄','金','薄黄','白','薄灰','灰','中灰','濃灰','黒'];
const SITE_H=40,ROW_H=26,DAY_W=26;

// 日本の祝日
const HOLIDAYS=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2025-12-23',
'2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2026-12-23',
'2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19','2027-08-11','2027-09-20','2027-09-23','2027-10-11','2027-11-03','2027-11-23','2027-12-23']);
function isHoliday(d){return HOLIDAYS.has(fmt(d));}


function toN(d){if(!d||typeof d.getFullYear!=='function')return 0;return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function parseD(s){if(!s)return null;let p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmt(d){if(!d||typeof d.getFullYear!=='function')return'';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(s){if(!s)return'';const d=parseD(s);return(d.getMonth()+1)+'/'+d.getDate();}
function addDays(d,n){let r=new Date(d);r.setDate(r.getDate()+n);return r}
function isWk(d){return d.getDay()===0||d.getDay()===6}
function isToday(d){return toN(d)===toN(new Date())}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}
function lighten(hex,amt){const[r,g,b]=hexToRgb(hex);return'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')';}
function darken(hex,amt){const[r,g,b]=hexToRgb(hex);return'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')';}

let viewStart,viewEnd;
(function(){
  let n=new Date();
  viewStart=addDays(n,-2);
  viewEnd=new Date(n.getFullYear(),n.getMonth()+2,0);
  document.getElementById('startDate').value=fmt(viewStart);
  document.getElementById('endDate').value=fmt(viewEnd);
})();

let sites=[];
let nextSid=100,nextPid=1000,nextCid=10000;
const _isSP=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let masters={clients:[],persons:[],procNames:[]};
const GAS_URL='https://script.google.com/macros/s/AKfycbzliNpkjVDN4-TO-ibJqwP4DJc0a-ymv4Gh_PmbC7_DJcvfvBvex90f9OOIS2h5IPqN/exec';
async function gasLoad(key){try{const r=await fetch(GAS_URL+'?action=load&key='+encodeURIComponent(key));const j=await r.json();return j.ok?j.value:null;}catch(e){return null;}}
async function gasSave(key,val){try{const r=await fetch(GAS_URL,{method:'POST',body:new URLSearchParams({action:'save',key,value:JSON.stringify(val)})});const j=await r.json();return j.ok;}catch(e){return false;}}
async function gasArchiveSite(siteId,by){try{const r=await fetch(GAS_URL,{method:'POST',body:new URLSearchParams({action:'archive_site',site_id:String(siteId),archived_by:by||'manual'})});const j=await r.json();return j.ok?{ok:true}:{ok:false,error:j.error||'unknown'};}catch(e){return{ok:false,error:e.message};}}
async function gasUnarchiveSite(siteId){try{const r=await fetch(GAS_URL,{method:'POST',body:new URLSearchParams({action:'unarchive_site',site_id:String(siteId)})});const j=await r.json();return j.ok?{ok:true}:{ok:false,error:j.error||'unknown'};}catch(e){return{ok:false,error:e.message};}}
async function gasLoadArchived(){try{const r=await fetch(GAS_URL+'?action=load_archived');const j=await r.json();if(!j.ok)return null;return j.value?JSON.parse(j.value):[];}catch(e){return null;}}
let _syncTimer=null;
function showSyncStatus(msg,ms){const el=document.getElementById('syncStatus');if(el)el.textContent=msg;if(_syncTimer)clearTimeout(_syncTimer);if(ms)_syncTimer=setTimeout(()=>{if(el)el.textContent='';},ms);}

function loadMasters(){
  try{const d=localStorage.getItem('gantt_masters');if(d)masters=JSON.parse(d);}catch(e){}
  if(!masters.clients.length)masters.clients=['有限会社彩建'];
  if(!masters.persons.length)masters.persons=['秀力内装','岩瀬畳店','大川龍真','Eサービス'];
  if(!masters.procNames.length)masters.procNames=['クロス','畳表替え','フローリング','クリーニング','エアコン新設','コーキング','雑工事','水回り'];
  gasLoad('gantt_masters').then(v=>{if(v)try{masters=JSON.parse(v);}catch(e){}});
}
function saveMasters(){localStorage.setItem('gantt_masters',JSON.stringify(masters));gasSave('gantt_masters',masters);}

function normalizeSites(raw){
  raw.forEach(s=>s.processes.forEach(p=>{
    if(!p.periods){p.periods=[];if(p.startD||p.endD)p.periods.push({startD:p.startD||'',endD:p.endD||''});delete p.startD;delete p.endD;}
    if(!p.children)p.children=[];
  }));
  nextSid=Math.max(nextSid,...raw.map(s=>s.id))+1;
  const pids=raw.flatMap(s=>s.processes.map(p=>p.id));if(pids.length)nextPid=Math.max(nextPid,...pids)+1;
  const cids=raw.flatMap(s=>s.processes.flatMap(p=>(p.children||[]).map(c=>c.id)));if(cids.length)nextCid=Math.max(nextCid,...cids)+1;
  return raw;
}

let _undoStack=[];
let _lastSaved=null;
function saveData(){
  // アーカイブ閲覧モード中は保存しない（重要: sitesがアーカイブデータなのでGASに書き込むと大惨事）
  if(_viewMode==='archived'){console.warn('saveData: archived mode, skip');return;}
  // 保存前の状態をundoスタックに積む
  if(_lastSaved!==null){
    _undoStack.push(_lastSaved);
    if(_undoStack.length>20)_undoStack.shift();
    const el=document.getElementById('undoBtn');if(el)el.disabled=false;
  }
  _lastSaved=JSON.stringify(sites);
  localStorage.setItem('gantt_sites',_lastSaved);showSyncStatus('保存中…');gasSave('gantt_sites',sites).then(ok=>showSyncStatus(ok?'✓ 保存済み':'保存失敗',2000));
}
// 子バーの期間が親バーを超えたら親バーを自動拡張する
function _expandProcPeriods(proc){
  const allChildPeriods=(proc.children||[]).flatMap(c=>c.periods||[]).filter(p=>p.startD&&p.endD);
  if(!allChildPeriods.length)return;
  const minN=Math.min(...allChildPeriods.map(p=>toN(parseD(p.startD))));
  const maxN=Math.max(...allChildPeriods.map(p=>toN(parseD(p.endD))));
  const toDate=(n)=>fmt(new Date(Math.floor(n/10000),Math.floor((n%10000)/100)-1,n%100));
  if(!proc.periods||!proc.periods.length){proc.periods=[{startD:toDate(minN),endD:toDate(maxN)}];return;}
  proc.periods[0].startD=toDate(minN);
  proc.periods[0].endD=toDate(maxN);
}

function scrollToToday(){
  const th=document.querySelector('thead th.tod');
  if(!th)return;
  const gs=document.getElementById('ganttScroll');
  const rect=th.getBoundingClientRect();
  const gsRect=gs.getBoundingClientRect();
  gs.scrollLeft+=rect.left-gsRect.left-(gsRect.width/2);
  _savedScrollLeft=gs.scrollLeft;
}
function undoLast(){
  if(!_undoStack.length)return;
  const prev=_undoStack.pop();
  _lastSaved=prev;
  sites=normalizeSites(JSON.parse(prev));
  localStorage.setItem('gantt_sites',prev);
  gasSave('gantt_sites',sites);
  // undo後はボタンの右にトースト表示
  const um=document.getElementById('undoMsg');
  if(um){um.textContent='元に戻しました';setTimeout(()=>{um.textContent='';},2000);}
  const el=document.getElementById('undoBtn');if(el)el.disabled=_undoStack.length===0;
  render();
}

function getDays(){
  let days=[],d=new Date(viewStart);
  while(toN(d)<=toN(viewEnd)){days.push(new Date(d));d=addDays(d,1);}
  return days;
}

function makeBar(col,spanCount,label,isDone,isShort,dayW){
  if(!dayW)dayW=DAY_W;
  const bar=document.createElement('div');
  bar.style.cssText=`position:absolute;top:3px;bottom:3px;left:0;width:${spanCount*dayW}px;z-index:2;display:flex;align-items:center;overflow:visible;border-radius:3px;cursor:grab;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;`;
  if(isDone){
    bar.style.background='linear-gradient(to bottom,#5a5a5a,#333333)';
    bar.style.boxShadow='inset 0 0 0 1px #7d7d7d';
  }else{
    bar.style.background='linear-gradient(to bottom,'+lighten(col,60)+' 0%,'+lighten(col,20)+' 45%,'+darken(col,20)+' 55%,'+darken(col,40)+' 100%)';
    bar.style.boxShadow='inset 0 0 0 1px #f5c800';
  }
  // 左リサイズハンドル
  const lh=document.createElement('div');
  lh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:'+(isDone?'#7d7d7d':'#f5c800')+';border-radius:3px 0 0 3px;opacity:0.85;';
  lh.dataset.handle='left';
  bar.appendChild(lh);
  // ラベル
  const lbl=document.createElement('span');
  const isLight=['#ffffff','#f0f0f0','#cccccc','#E8D5A3','#A8D5A2','#FFFF00','#FFD700','#FFF176'].includes(col);
  lbl.style.cssText='font-size:11px;font-weight:500;color:'+(isLight?'#333':'#fff')+';padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;pointer-events:none;text-shadow:0 1px 1px rgba(0,0,0,'+(isLight?'0':'0.3')+')';
  lbl.textContent=label;
  bar.appendChild(lbl);
  // 右リサイズハンドル
  const rh=document.createElement('div');
  rh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:'+(isDone?'#7d7d7d':'#f5c800')+';border-radius:0 3px 3px 0;opacity:0.85;';
  rh.dataset.handle='right';
  bar.appendChild(rh);
  // iOSのコピーメニューを防ぐ
  bar.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});
  // バー短い時は右外にラベル
  if(isShort){
    const ol=document.createElement('div');
    ol.style.cssText=`position:absolute;top:4px;left:${spanCount*dayW+3}px;font-size:11px;font-weight:500;color:#444;white-space:nowrap;pointer-events:none;z-index:3`;
    ol.textContent=label;
    bar.appendChild(ol);
  }
  return bar;
}

function _renderInner(){
  rebuildSelects();
  const fc=document.getElementById('filterClient').value;
  const fp=document.getElementById('filterPerson').value;
  const days=getDays();
  // 実際のセル幅を取得（スマホは34px、PCは26px）
  const _dayW=(()=>{const th=document.querySelector('th.day-col');if(th){const w=th.getBoundingClientRect().width;return w>0?w:(_isSP?24:DAY_W);}return _isSP?24:DAY_W;})();

  // headは日付範囲が変わったときだけ再構築（毎回リビルドするとscrollLeftがリセットされる）
  const _headKey=fmt(viewStart)+'_'+fmt(viewEnd);
  if(document.getElementById('ganttHead').dataset.rangeKey!==_headKey){
    let headHtml='<tr><th class="col-info" style="height:36px"><div style="display:flex;align-items:center;gap:4px;padding:0 8px">物件 / 工程<span style="margin-left:auto;display:flex;gap:3px"><button onclick="expandAll()" style="height:18px;padding:0 5px;font-size:11px;border-radius:4px;border:1px solid #bbb;background:#fff;cursor:pointer;line-height:1" title="全展開">＋</button><button onclick="collapseAll()" style="height:18px;padding:0 5px;font-size:11px;border-radius:4px;border:1px solid #bbb;background:#fff;cursor:pointer;line-height:1" title="全縮小">－</button></span></div></th>';
    days.forEach(day=>{
      const wk=isWk(day),tod=isToday(day),hol=isHoliday(day);
      const wd=['日','月','火','水','木','金','土'][day.getDay()];
      const isSat=day.getDay()===6,isSunOrHol=day.getDay()===0||hol;
      const dayColor=tod?'':isSat?'color:#2980B9':isSunOrHol?'color:#E24B4A':'';
      headHtml+=`<th class="day-col${wk?' wk':''}${tod?' tod':''}" style="height:36px;${dayColor?dayColor+';':''}">${day.getDate()}<br><span style="font-size:9px">${wd}</span></th>`;
    });
    headHtml+='</tr>';
    document.getElementById('ganttHead').innerHTML=headHtml;
    document.getElementById('ganttHead').dataset.rangeKey=_headKey;
  }

  const frag=document.createDocumentFragment();
  const warnDays=parseInt(document.getElementById('warnDays').value)||3;
  const todayN=toN(new Date());

  sites.filter(site=>{
    if(fc&&site.client!==fc)return false;
    if(fp&&!site.processes.some(p=>p.person===fp))return false;
    return true;
  }).forEach(site=>{
    const procs=site.processes.filter(p=>fp?p.person===fp:true);
    const nd=procs.filter(p=>!p.periods||!p.periods.length).length;
    const mapUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(site.addr);
    const hasUnset=site.processes.some(p=>!p.periods||!p.periods.length);
    const koukiEndN=site.koukiEnd?toN(parseD(site.koukiEnd)):null;
    const isWarn=hasUnset&&koukiEndN!==null&&koukiEndN>=todayN&&koukiEndN<=toN(addDays(new Date(),warnDays));

    // 物件行
    // === 工期とミニバーの配置を計算（siteRow内で描画するための事前計算） ===
    const ks=site.koukiStart,ke=site.koukiEnd;
    // ミニバー用のレーン計算
    const barItems=[];
    procs.forEach(proc=>{
      (proc.periods||[]).forEach(period=>{
        if(!period.startD||!period.endD)return;
        const sN=toN(parseD(period.startD));
        const eN=toN(parseD(period.endD));
        if(isNaN(sN)||isNaN(eN))return;
        barItems.push({proc,period,startN:sN,endN:eN,lane:-1});
      });
    });
    barItems.sort((a,b)=>a.startN-b.startN||a.endN-b.endN);
    const laneEnds=[];
    barItems.forEach(item=>{
      let assignedLane=-1;
      for(let i=0;i<laneEnds.length;i++){
        if(laneEnds[i]<item.startN){assignedLane=i;break;}
      }
      if(assignedLane<0){assignedLane=laneEnds.length;laneEnds.push(item.endN);}
      else{laneEnds[assignedLane]=item.endN;}
      item.lane=assignedLane;
    });
    const laneCount=Math.max(1,laneEnds.length);
    const LANE_H=14;
    const LANE_GAP=2;
    // レイアウト：上段=工期(18px) + 余白2px + ミニバー(laneCount段) + 下余白4px
    const KOUKI_BAR_H=18;
    const TOP_PAD=3;
    const MID_GAP=2;
    const BOTTOM_PAD=4;
    const miniAreaH=barItems.length>0?(laneCount*LANE_H+(laneCount-1)*LANE_GAP):0;
    const contentH=TOP_PAD+KOUKI_BAR_H+MID_GAP+miniAreaH+BOTTOM_PAD;
    const rowHeight=Math.max(SITE_H,contentH);

    const siteRow=document.createElement('tr');
    siteRow.className='row-site'+(isWarn?' site-warn':'');
    siteRow.style.height=rowHeight+'px';
    const siteTd=document.createElement('td');
    siteTd.className='col-info';
    const ndBadge=nd>0?`<span class="badge-nd">未定${nd}</span>`:'';
    const warnBadge='';
    const dropboxBtn=site.dropboxUrl?`<a href="${site.dropboxUrl}" target="_blank" class="dropbox-btn" style="flex-shrink:0;text-decoration:none;display:flex;align-items:center;color:#FFC84A" title="Dropboxを開く"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></a>`:'';
    const clientStr=site.client?'　'+esc(site.client):'';
    const koukiLabel=(ks&&ke)?`工期 ${fmtD(ks)} 〜 ${fmtD(ke)}`:'<span style="color:#185FA5">＋工期設定</span>';
    const procInfoLabel=procs.length>0?`工程 ${procs.length}件${laneCount>1?' / '+laneCount+'段':''}`:'';
    siteTd.innerHTML=`<div class="site-inner"><div class="site-top">
      <span class="sort-handle-site" data-site="${site.id}" title="ドラッグで並び替え">⠿</span>
      <span class="toggle" onclick="toggleSite(${site.id})">${site.collapsed?'▶':'▼'}</span>
      <span class="site-name" onclick="toggleSite(${site.id})">${esc(site.name)}</span>
      ${ndBadge}${warnBadge}${dropboxBtn}
      <button class="btn btn-sm" style="flex-shrink:0" onclick="openSiteModal(${site.id})">編集</button>
      <button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="openProcModal(${site.id},null)">＋</button>
      </div>
      <div class="site-sub">${esc(site.addr)}<a href="${mapUrl}" style="color:#185FA5;font-size:10px;margin-left:3px" target="_blank">地図</a>${clientStr}</div>
      ${site.keyLocation?`<div class="site-sub site-key">🔑 ${esc(site.keyLocation)}</div>`:''}
      <div class="site-sub" style="display:flex;gap:8px;align-items:center;padding-left:16px;font-size:10px">
        <span style="color:#555;cursor:pointer" onclick="openKoukiModal(${site.id})">${koukiLabel}</span>
        ${procInfoLabel?`<span style="color:#888">${procInfoLabel}</span>`:''}
      </div>
      </div>`;
    siteRow.appendChild(siteTd);

    // 日付セルを作成
    const siteDayCells=[];
    days.forEach((day,di)=>{
      const td=document.createElement('td');
      td.className='day-cell'+(isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
      td.dataset.kouki=site.id;td.dataset.di=di;
      // 工期行：長押し500msでバー作成開始
      td.onmousedown=(e)=>{
        if(e.target.closest('[data-handle]'))return;
        if(e.target.closest('.mini-bar'))return;
        // 工期バー本体の上ならスキップ（バー側で処理済み）
        if(e.target.closest('[data-barclass="kouki"]'))return;
        e.preventDefault();
        const d=days[di];
        const sid=site.id;
        _koukiLPX=e.clientX;_koukiLPY=e.clientY;
        _koukiLongPress=setTimeout(()=>{
          _koukiLongPress=null;
          const s2=sites.find(x=>x.id===sid);
          if(s2){s2.koukiStart=fmt(d);s2.koukiEnd=fmt(d);}
          barDrag={active:true,type:'right',isKouki:true,siteId:sid,procId:null,periodIdx:null,
            origStart:fmt(d),origEnd:fmt(d),startMouseDi:null};
          render();
        },150);
      };
      td.onmouseup=()=>{
        if(_koukiLongPress){clearTimeout(_koukiLongPress);_koukiLongPress=null;}
        else if(barDrag.active&&barDrag.isKouki){barDrag.active=false;saveData();}
      };
      td.onmousemove=(e)=>{
        if(!_koukiLongPress)return;
        if(Math.abs(e.clientX-_koukiLPX)>10||Math.abs(e.clientY-_koukiLPY)>10){clearTimeout(_koukiLongPress);_koukiLongPress=null;}
      };
      siteRow.appendChild(td);
      siteDayCells.push(td);
    });

    // 工期バーを上段に描画
    if(ks&&ke){
      const ksN=toN(parseD(ks)),keN=toN(parseD(ke));
      const si=days.findIndex(d=>toN(d)===ksN);
      const ei=days.findIndex(d=>toN(d)===keN);
      const asi=si>=0?si:(toN(days[0])>ksN?0:-1);
      const aei=ei>=0?ei:(toN(days[days.length-1])<keN?days.length-1:-1);
      if(asi>=0&&aei>=0){
        const sc=siteDayCells[asi];
        if(sc){
          sc.style.position='relative';sc.style.overflow='visible';sc.style.touchAction='pan-x pan-y';
          const span=aei-asi+1;
          const _allDone=site.processes&&site.processes.length>0&&site.processes.every(p=>p.done);
          const _koukiColor=_allDone?'#999':'#3949ab';
          const bar=makeBar(_koukiColor,span,_allDone?'工期 ✓完了':'工期',_allDone,span<=3,_dayW);

          };

            barDrag={active:true,type:'left',isKouki:true,siteId:site.id,procId:null,periodIdx:null,origStart:ks,origEnd:ke,startMouseDi:null};};
          bar.querySelector('[data-handle="right"]').onmousedown=(e)=>{e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'right',isKouki:true,siteId:site.id,procId:null,periodIdx:null,origStart:ks,origEnd:ke,startMouseDi:null};};
          sc.appendChild(bar);
        }

    // ミニバーを下段に描画
    barItems.forEach(item=>{
      const {proc,period,lane}=item;
      const psi=days.findIndex(d=>toN(d)===item.startN);
      const pei=days.findIndex(d=>toN(d)===item.endN);
      const asi=psi>=0?psi:(toN(days[0])>item.startN?0:-1);
      const aei=pei>=0?pei:(toN(days[days.length-1])<item.endN?days.length-1:-1);
      if(asi<0||aei<0)return;
      const sc=siteDayCells[asi];
      if(!sc)return;
      sc.style.position='relative';
      sc.style.overflow='visible';
      const span=aei-asi+1;
      const mini=document.createElement('div');
      mini.className='mini-bar';
      const barColor=proc.color||'#7cb9ff';
      const topPx=TOP_PAD+KOUKI_BAR_H+MID_GAP+lane*(LANE_H+LANE_GAP);
      // 未発注判定：発注管理する子項目で、まだ発注されていないものがあるか
      const _unordered=(proc.children||[]).some(c=>c.ordered===false);
      let bg,boxShadow;
      if(proc.done){
        bg='linear-gradient(to bottom,#5a5a5a,#333333)';
        boxShadow='inset 0 0 0 1px #7d7d7d';
      }else{
        bg='linear-gradient(to bottom,'+lighten(barColor,60)+' 0%,'+lighten(barColor,20)+' 45%,'+darken(barColor,20)+' 55%,'+darken(barColor,40)+' 100%)';
        // 未発注がある場合は赤いボーダー、なければ通常の黄色
        boxShadow=_unordered?'inset 0 0 0 1.5px #E74C3C':'inset 0 0 0 1px #f5c800';
      }
      mini.style.cssText=`position:absolute;top:${topPx}px;height:${LANE_H}px;left:0;width:${span*_dayW}px;z-index:2;border-radius:3px;background:${bg};box-shadow:${boxShadow};display:flex;align-items:center;padding:0 4px;overflow:hidden;cursor:pointer;`;
      // 未発注マーク（ラベルの左に赤い⚠）
      if(_unordered&&!proc.done){
        const warnMark=document.createElement('span');
        warnMark.style.cssText='background:#E74C3C;color:#fff;font-size:8px;font-weight:700;padding:1px 3px;border-radius:2px;margin-right:3px;flex-shrink:0;line-height:1;pointer-events:none';
        warnMark.textContent='未';
        mini.appendChild(warnMark);
      }
      const lbl=document.createElement('span');
      const isLight=['#ffffff','#f0f0f0','#cccccc','#E8D5A3','#A8D5A2','#FFFF00','#FFD700','#FFF176'].includes(barColor);
      lbl.style.cssText='font-size:9px;font-weight:500;color:'+(proc.done||!isLight?'#fff':'#333')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;line-height:1;text-shadow:0 1px 1px rgba(0,0,0,'+(isLight&&!proc.done?'0':'0.3')+')';
      lbl.textContent=proc.name;
      mini.appendChild(lbl);
      // ミニバーをクリックしても折りたたみ切り替えしない（展開時も表示されるため）
      mini.onclick=(e)=>{e.stopPropagation();};
      // 子項目リスト付きツールチップ
      const _children=proc.children||[];
      mini.addEventListener('mouseenter',function(ev){
        let tip=document.getElementById('childTip');
        if(!tip){tip=document.createElement('div');tip.id='childTip';tip.style.cssText='position:fixed;z-index:3000;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);padding:8px 12px;font-size:11px;min-width:140px;pointer-events:none';document.body.appendChild(tip);}
        const hdr='<div style="font-weight:600;color:#0C447C'+(_children.length>0?';margin-bottom:4px':'')+'">'+esc(proc.name)+(proc.person?' <span style="font-weight:400;color:#888;font-size:10px">/ '+esc(proc.person)+'</span>':'')+'</div>';
        const body=_children.length>0
          ?_children.map(c=>{
            const trackOrder=c.ordered!==undefined;
            const orderMark=trackOrder?(c.ordered?' <span style="color:#27AE60;font-size:9px;font-weight:600">発注済</span>':' <span style="color:#E74C3C;font-size:9px;font-weight:600">未発注</span>'):'';
            return '<div style="color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0">└ '+esc(c.name)+(c.area?' <span style="color:#aaa">'+esc(c.area)+'</span>':'')+orderMark+'</div>';
          }).join('')
          :'';
        tip.innerHTML=hdr+body;
        tip.style.display='block';
        tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';
        tip.style.top=Math.max(ev.clientY-20,4)+'px';
      });
      mini.addEventListener('mousemove',function(ev){
        const tip=document.getElementById('childTip');
        if(tip){tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';tip.style.top=Math.max(ev.clientY-20,4)+'px';}
      });
      mini.addEventListener('mouseleave',function(){
        const tip=document.getElementById('childTip');if(tip)tip.style.display='none';
      });
      mini.addEventListener('touchstart',function(ev){
        let tip=document.getElementById('childTip');
        if(!tip){tip=document.createElement('div');tip.id='childTip';tip.style.cssText='position:fixed;z-index:3000;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);padding:8px 12px;font-size:11px;min-width:140px;pointer-events:none';document.body.appendChild(tip);}
        const hdr='<div style="font-weight:600;color:#0C447C'+(_children.length>0?';margin-bottom:4px':'')+'">'+esc(proc.name)+(proc.person?' <span style="font-weight:400;color:#888;font-size:10px">/ '+esc(proc.person)+'</span>':'')+'</div>';
        const body=_children.length>0
          ?_children.map(c=>{
            const trackOrder=c.ordered!==undefined;
            const orderMark=trackOrder?(c.ordered?' <span style="color:#27AE60;font-size:9px;font-weight:600">発注済</span>':' <span style="color:#E74C3C;font-size:9px;font-weight:600">未発注</span>'):'';
            return '<div style="color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0">└ '+esc(c.name)+(c.area?' <span style="color:#aaa">'+esc(c.area)+'</span>':'')+orderMark+'</div>';
          }).join('')
          :'';
        tip.innerHTML=hdr+body;
        tip.style.display='block';
        const t=ev.touches[0];
        tip.style.left=Math.min(t.clientX+12,window.innerWidth-200)+'px';
        tip.style.top=Math.max(t.clientY-40,4)+'px';
        setTimeout(()=>{if(tip)tip.style.display='none';},2500);
      },{passive:true});
      sc.appendChild(mini);
    });

    frag.appendChild(siteRow);

    // === 折りたたみ時は工期行・ミニバー行を追加しない（siteRowに統合済み） ===
    if(!site.collapsed){
      procs.forEach(proc=>{
        const periods=proc.periods||[];
        const hasPeriod=periods.some(p=>p.startD&&p.endD);
        const procWarn=isWarn&&!hasPeriod;

        const procRow=document.createElement('tr');
        procRow.className='row-proc'+(proc.done?' done':procWarn?' proc-warn':'')+((proc.children&&proc.children.length>0)?' row-parent':'');
        procRow.style.height=ROW_H+'px';
        const procTd=document.createElement('td');
        procTd.className='col-info';
        const meta=proc.person||'';
        const nodateBadge=procWarn?'<span class="badge-procwarn">⚠ 未発注</span>':(!hasPeriod?'<span class="badge-nodate">未定</span>':'');
        const children=proc.children||[];
        const hasChildren=children.length>0;
        const childCollapsed=proc.childCollapsed||false;
        const toggleIcon=hasChildren?(childCollapsed?'▶':'▼'):'';
        procTd.innerHTML=`<div class="proc-inner">
          <span class="sort-handle" data-proc="${proc.id}" data-site="${site.id}" title="ドラッグで並び替え">⠿</span>
          <div class="chk${proc.done?' done':(hasChildren&&!proc.done?' disabled':'')} " onclick="${hasChildren?'allChildrenDone('+proc.id+')?toggleDone('+proc.id+'):null':'toggleDone('+proc.id+')'}" style="${hasChildren&&!proc.done?'opacity:0.3;cursor:not-allowed':''}">${proc.done?'✓':''}</div>
          ${hasChildren?`<span style="cursor:pointer;font-size:11px;color:#888;flex-shrink:0;width:12px" onclick="toggleChildren(${proc.id})">${toggleIcon}</span>`:'<span style="width:12px;flex-shrink:0"></span>'}
          <span class="proc-name${proc.done?' done':''}">${esc(proc.name)}</span>
          ${nodateBadge}
          <span class="proc-meta">${esc(meta)}</span>
          <button class="btn btn-sm" style="flex-shrink:0" onclick="openProcModal(${site.id},${proc.id})">編集</button>
          <button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="openChildModal(${site.id},${proc.id},null)" title="子項目追加">＋</button>
          </div>`;
        procRow.appendChild(procTd);

        const dayCells=[];
        days.forEach((day,di)=>{
          const td=document.createElement('td');
          td.className='day-cell'+(isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
          td.dataset.proc=proc.id;td.dataset.site=site.id;td.dataset.di=di;
          procRow.appendChild(td);
          dayCells.push(td);
        });

        // 各periodのバーを描画
        periods.forEach((period,pi)=>{
          if(!period.startD||!period.endD)return;
          const psN=toN(parseD(period.startD));
          const peN=toN(parseD(period.endD));
          const si=days.findIndex(d=>toN(d)===psN);
          const ei=days.findIndex(d=>toN(d)===peN);
          const asi=si>=0?si:(toN(days[0])>psN?0:-1);
          const aei=ei>=0?ei:(toN(days[days.length-1])<peN?days.length-1:-1);
          if(asi<0||aei<0)return;
          const sc=dayCells[asi];
          if(!sc)return;
          sc.style.position='relative';sc.style.overflow='visible';sc.style.touchAction='pan-x pan-y';
          const span=aei-asi+1;
          const col=proc.done?'#999':proc.color;
          const bar=makeBar(col,span,proc.name+(proc.done&&proc.doneDate?' ✓'+fmtD(proc.doneDate):''),proc.done,span<=3,_dayW);
          bar.dataset.procId=proc.id;bar.dataset.siteId=site.id;
          bar.onclick=(e)=>{if(e.target.closest('[data-handle]'))return;openProcModal(site.id,proc.id);};
          bar.onmousedown=(e)=>{
            if(e.target.closest('[data-handle]'))return;
            e.preventDefault();e.stopPropagation();
            const cellRect=sc.getBoundingClientRect();
            barDrag={active:true,type:'move',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,
              startMouseDi:asi+Math.floor((e.clientX-cellRect.left)/_dayW),
              origStart:period.startD,origEnd:period.endD};
          };
          bar.querySelector('[data-handle="left"]').onmousedown=(e)=>{
            e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'left',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,origStart:period.startD,origEnd:period.endD,startMouseDi:null};
          };
          bar.querySelector('[data-handle="right"]').onmousedown=(e)=>{
            e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'right',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,origStart:period.startD,origEnd:period.endD,startMouseDi:null};
          };
          // PCホバーで子項目ツールチップ
          if(children.length>0){
            bar.addEventListener('mouseenter',function(ev){
              let tip=document.getElementById('childTip');
              if(!tip){tip=document.createElement('div');tip.id='childTip';tip.style.cssText='position:fixed;z-index:3000;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);padding:8px 12px;font-size:11px;min-width:140px;pointer-events:none';document.body.appendChild(tip);}
              tip.innerHTML='<div style="font-weight:600;color:#0C447C;margin-bottom:4px">'+esc(proc.name)+'</div>'+children.map(c=>'<div style="color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0">└ '+esc(c.name)+(c.area?' <span style="color:#aaa">'+esc(c.area)+'</span>':'')+'</div>').join('');
              tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';
              tip.style.top=Math.max(ev.clientY-20,4)+'px';
              tip.style.display='block';
            });
            bar.addEventListener('mousemove',function(ev){
              const tip=document.getElementById('childTip');
              if(tip){tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';tip.style.top=Math.max(ev.clientY-20,4)+'px';}
            });
            bar.addEventListener('mouseleave',function(){
              const tip=document.getElementById('childTip');if(tip)tip.style.display='none';
            });
          }
          sc.appendChild(bar);
        });

        // 空きセルの長押し（500ms）で新しいperiodのドラッグ開始
        let _procLongPress=null,_procLongPressX=0,_procLongPressY=0;
        dayCells.forEach((td,di)=>{
          td.onmousedown=(e)=>{
            if(e.target.closest('[data-handle]'))return;
            // バーの上はドラッグ開始を許可
            if(e.target.closest('[data-proc-id]'))return;
            e.preventDefault();
            const d=days[di];
            const sid=site.id,pid=proc.id;
            _procLongPressX=e.clientX;_procLongPressY=e.clientY;
            _procLongPress=setTimeout(()=>{
              _procLongPress=null;
              const site2=sites.find(x=>x.id===sid);
              const proc2=site2&&site2.processes.find(x=>x.id===pid);
              if(!proc2)return;
              proc2.periods.push({startD:fmt(d),endD:fmt(d)});
              barDrag={active:true,type:'right',isKouki:false,isNew:true,
                siteId:sid,procId:pid,periodIdx:proc2.periods.length-1,
                startMouseDi:di,origStart:fmt(d),origEnd:fmt(d)};
              render();
            },200);
          };
          td.onmouseup=()=>{if(_procLongPress){clearTimeout(_procLongPress);_procLongPress=null;}};
          td.onmousemove=(e)=>{
            if(!_procLongPress)return;
            if(Math.abs(e.clientX-_procLongPressX)>10||Math.abs(e.clientY-_procLongPressY)>10){clearTimeout(_procLongPress);_procLongPress=null;}
          };
        });

        frag.appendChild(procRow);

        // 子項目行
        if(!proc.childCollapsed&&children.length>0){
          children.forEach((child,_childIdx)=>{
            const _isLastChild=(_childIdx===children.length-1);
            const childRow=document.createElement('tr');
            childRow.className='row-proc row-child'+(_isLastChild?' row-child-last':'')+(proc.done?' done':'')+(child.done?' child-done':'');
            childRow.style.height='22px';
            childRow.style.position='relative';
            childRow.style.zIndex='5';
            const childTd=document.createElement('td');
            childTd.className='col-info';
            const _trackOrder=child.ordered!==undefined;
            const _cColor=child.done?'#aaa':(_trackOrder&&!child.ordered?'#E74C3C':'#555');
            const _oMark=_trackOrder?`<span style="font-size:10px;flex-shrink:0;padding:0 3px;color:${child.ordered?'#27AE60':'#E74C3C'}">${child.ordered?'発注済':'未発注'}</span>`:'';
            childTd.innerHTML=`<div class="proc-inner" style="padding-left:56px">
              <div class="chk${child.done?' done':''}" onclick="toggleChildDone(${proc.id},${child.id})" style="width:16px;height:16px;font-size:10px;flex-shrink:0">${child.done?'✓':''}</div>
              <span style="font-size:11px;color:${_cColor};flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(child.name)}${child.area?' <span style="color:#aaa">'+esc(child.area)+'</span>':''}${child.material?' <span style="color:inherit;font-size:10px"> '+esc(child.material)+'</span>':''}${child.note?' <span style="color:#aaa;font-size:10px">'+esc(child.note)+'</span>':''}</span>
              ${_oMark}
              <button class="btn btn-sm child-edit-btn" style="flex-shrink:0;font-size:10px;height:18px;padding:0 5px" onclick="openChildModal(${site.id},${proc.id},${child.id})">編集</button>
              </div>`;
            childRow.appendChild(childTd);
            const childDayCells=[];
            days.forEach((day,di)=>{
              const td=document.createElement('td');
              td.className='day-cell'+(isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
              td.dataset.ischild='1';
              td.dataset.di=di;
              td.onmousedown=(e)=>{
                if(barDrag.active)return;
                e.preventDefault();e.stopPropagation();return false;
              };
              td.onclick=(e)=>{e.preventDefault();e.stopPropagation();return false;};
              td.onmouseup=(e)=>{
                if(barDrag.active)return;
                e.stopPropagation();
              };
              childRow.appendChild(td);
              childDayCells.push(td);
            });
            // 子バーの期間：child.periodsがあればそれを使う、なければ表示しない
            const childPeriods=(child.periods&&child.periods.length)?child.periods:[];
            childPeriods.forEach((period,pi)=>{
              if(!period.startD||!period.endD)return;
              const psN=toN(parseD(period.startD));
              const peN=toN(parseD(period.endD));
              const si=days.findIndex(d=>toN(d)===psN);
              const ei=days.findIndex(d=>toN(d)===peN);
              const asi=si>=0?si:(toN(days[0])>psN?0:-1);
              const aei=ei>=0?ei:(toN(days[days.length-1])<peN?days.length-1:-1);
              if(asi<0||aei<0)return;
              const sc=childDayCells[asi];
              if(!sc)return;
              sc.style.position='relative';sc.style.overflow='visible';sc.style.touchAction='pan-x pan-y';
              const span=aei-asi+1;
              const col=proc.done?'#999':proc.color;
              const cbar=document.createElement('div');
              const _dw=sc.getBoundingClientRect().width||DAY_W;
              const hasOwnPeriods=!!(child.periods&&child.periods.length);
              // 子バーは少し細く・透過して親バーと区別
              cbar.style.cssText=`position:absolute;top:5px;bottom:5px;left:0;width:${span*_dw}px;z-index:2;display:flex;align-items:center;overflow:visible;border-radius:2px;${hasOwnPeriods?'cursor:grab;':'pointer-events:none;'}user-select:none;-webkit-user-select:none;`;
              if(proc.done){
                cbar.style.background='linear-gradient(to bottom,#6a6a6a,#444444)';
                cbar.style.boxShadow='inset 0 0 0 1px #888';
              }else{
                cbar.style.background='linear-gradient(to bottom,'+lighten(col,40)+' 0%,'+lighten(col,10)+' 45%,'+darken(col,30)+' 100%)';
                cbar.style.boxShadow='inset 0 0 0 1px rgba(255,200,0,0.7)';
                cbar.style.opacity='0.85';
              }
              if(hasOwnPeriods){
                const lh=document.createElement('div');
                lh.style.cssText='width:5px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(255,200,0,0.8);border-radius:2px 0 0 2px;';
                lh.dataset.handle='left';
                cbar.appendChild(lh);
                const clbl=document.createElement('span');
                clbl.style.cssText='font-size:9px;font-weight:500;color:#fff;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;pointer-events:none;text-shadow:0 1px 1px rgba(0,0,0,0.3)';
                clbl.textContent=child.name+(child.area?' '+child.area:'')+(child.done&&child.doneDate?' ✓'+fmtD(child.doneDate):'');
                cbar.appendChild(clbl);
                const rh=document.createElement('div');
                rh.style.cssText='width:5px;height:100%;cursor:ew-resize;flex-shrink:0;background:rgba(255,200,0,0.8);border-radius:0 2px 2px 0;';
                rh.dataset.handle='right';
                cbar.appendChild(rh);
                cbar.dataset.childId=child.id;
                cbar.dataset.procId=proc.id;
                cbar.dataset.siteId=site.id;
                cbar.dataset.periodIdx=pi;
                cbar.onmousedown=(e)=>{
                  if(e.target.closest('[data-handle]'))return;
                  e.preventDefault();e.stopPropagation();
                  barDrag={active:true,type:'move',isKouki:false,isChild:true,
                    siteId:site.id,procId:proc.id,childId:child.id,periodIdx:pi,
                    startMouseDi:asi+Math.floor((e.clientX-sc.getBoundingClientRect().left)/_dayW),
                    origStart:period.startD,origEnd:period.endD};
                };
                lh.onmousedown=(e)=>{e.preventDefault();e.stopPropagation();
                  barDrag={active:true,type:'left',isKouki:false,isChild:true,
                    siteId:site.id,procId:proc.id,childId:child.id,periodIdx:pi,
                    origStart:period.startD,origEnd:period.endD,startMouseDi:null};};
                rh.onmousedown=(e)=>{e.preventDefault();e.stopPropagation();
                  barDrag={active:true,type:'right',isKouki:false,isChild:true,
                    siteId:site.id,procId:proc.id,childId:child.id,periodIdx:pi,
                    origStart:period.startD,origEnd:period.endD,startMouseDi:null};};
              }else{
                const clbl=document.createElement('span');
                clbl.style.cssText='font-size:9px;font-weight:500;color:#fff;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;pointer-events:none;text-shadow:0 1px 1px rgba(0,0,0,0.3)';
                clbl.textContent=child.name+(child.area?' '+child.area:'')+(child.done&&child.doneDate?' ✓'+fmtD(child.doneDate):'');
                cbar.appendChild(clbl);
              }
              if(span<=3){
                const col2=document.createElement('div');
                col2.style.cssText=`position:absolute;top:2px;left:${span*_dw+3}px;font-size:9px;font-weight:500;color:#444;white-space:nowrap;pointer-events:none;z-index:3`;
                col2.textContent=child.name+(child.area?' '+child.area:'');
                cbar.appendChild(col2);
              }
              sc.appendChild(cbar);
            });
            // 独自期間がない場合、日付セルの長押しで期間設定できるようにする
            if(!(child.periods&&child.periods.length)){
              let _childLongPress=null;
              let _childLPX=0,_childLPY=0;
              childDayCells.forEach((td,di)=>{
                td.onmousedown=(e)=>{
                  if(barDrag.active)return;
                  e.preventDefault();e.stopPropagation();
                  const d=days[di];
                  const sid=site.id,pid=proc.id,cid=child.id;
                  _childLPX=e.clientX;_childLPY=e.clientY;
                  _childLongPress=setTimeout(()=>{
                    _childLongPress=null;
                    const s2=sites.find(x=>x.id===sid);
                    const p2=s2&&s2.processes.find(x=>x.id===pid);
                    const c2=p2&&p2.children.find(x=>x.id===cid);
                    if(!c2)return;
                    if(!c2.periods)c2.periods=[];
                    c2.periods.push({startD:fmt(d),endD:fmt(d)});
                    const newPeriodIdx=c2.periods.length-1;
                    // 親バーを即座に拡張（mousemove前に親バーを表示）
                    _expandProcPeriods(p2);
                    barDrag={active:true,type:'right',isKouki:false,isChild:true,isNew:true,
                      siteId:sid,procId:pid,childId:cid,periodIdx:newPeriodIdx,
                      startMouseDi:di,origStart:fmt(d),origEnd:fmt(d)};
                    render();
                  },300);
                  return false;
                };
                td.onmouseup=(e)=>{
                  if(barDrag.active)return;
                  if(_childLongPress){clearTimeout(_childLongPress);_childLongPress=null;}
                };
                td.onmousemove=(e)=>{
                  if(!_childLongPress)return;
                  if(Math.abs(e.clientX-_childLPX)>10||Math.abs(e.clientY-_childLPY)>10){
                    clearTimeout(_childLongPress);_childLongPress=null;
                  }
                };
              });
            }
            frag.appendChild(childRow);
          });
        }
      });
    }
  });

  const _gs=document.getElementById('ganttScroll');
  const _sl=_gs?_gs.scrollLeft:0;
  const _st=_gs?_gs.scrollTop:0;
  const tbody=document.getElementById('ganttBody');
  tbody.replaceChildren(frag);
  if(_gs&&!_isTouching){_gs.scrollLeft=_sl;_gs.scrollTop=_st;}
}

// バードラッグ処理
document.addEventListener('mousemove',function(e){
  if(_koukiLongPress){clearTimeout(_koukiLongPress);_koukiLongPress=null;}
  if(!barDrag.active)return;
  // moveの時だけstartMouseDiが必要（リサイズ時は不要）
  if(barDrag.type==='move'&&(barDrag.startMouseDi===null||isNaN(barDrag.startMouseDi)))return;
  const days=getDays();
  const _dayW=(()=>{const th=document.querySelector('th.day-col');if(th){const w=th.getBoundingClientRect().width;return w>0?w:(_isSP?24:DAY_W);}return _isSP?24:DAY_W;})();
  // マウス位置からdi計算
  let di=null;
  const cells=document.querySelectorAll('td.day-cell');
  for(const cell of cells){
    if(cell.dataset.ischild&&!barDrag.isChild)continue;  // 子バードラッグ中は子セルも対象
    const r=cell.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<r.right&&e.clientY>=r.top&&e.clientY<r.bottom){
      di=parseInt(cell.dataset.di);break;
    }
  }
  if(di===null)return;

  if(barDrag.isKouki){
    const site=sites.find(x=>x.id===barDrag.siteId);
    if(!site)return;
    const origSN=toN(parseD(barDrag.origStart));
    const origEN=toN(parseD(barDrag.origEnd));
    const origSi=days.findIndex(d=>toN(d)===origSN);
    const origEi=days.findIndex(d=>toN(d)===origEN);
    if(barDrag.type==='move'){
      const delta=di-barDrag.startMouseDi;
      const nsi=Math.max(0,Math.min(days.length-1,origSi+delta));
      const nei=Math.max(0,Math.min(days.length-1,origEi+delta));
      site.koukiStart=fmt(days[nsi]);site.koukiEnd=fmt(days[nei]);
    }else if(barDrag.type==='left'){
      const nsi=Math.max(0,Math.min(origEi,di));
      site.koukiStart=fmt(days[nsi]);
    }else{
      const nei=Math.max(Math.max(0,origSi),Math.min(days.length-1,di));
      site.koukiEnd=fmt(days[nei]);
    }
  }else if(barDrag.isChild){
    // 子バードラッグ
    const site=sites.find(x=>x.id===barDrag.siteId);
    const proc=site&&site.processes.find(x=>x.id===barDrag.procId);
    const child=proc&&proc.children.find(x=>x.id===barDrag.childId);
    if(!child||!child.periods)return;
    const period=child.periods[barDrag.periodIdx];
    if(!period)return;
    const origSN=toN(parseD(barDrag.origStart));
    const origEN=toN(parseD(barDrag.origEnd));
    const origSi=days.findIndex(d=>toN(d)===origSN);
    const origEi=days.findIndex(d=>toN(d)===origEN);
    if(barDrag.type==='move'){
      const delta=di-barDrag.startMouseDi;
      const nsi=Math.max(0,Math.min(days.length-1,origSi+delta));
      const nei=Math.max(0,Math.min(days.length-1,origEi+delta));
      period.startD=fmt(days[nsi]);period.endD=fmt(days[nei]);
    }else if(barDrag.type==='left'){
      const nsi=Math.max(0,Math.min(origEi,di));
      period.startD=fmt(days[nsi]);
    }else{
      const nei=Math.max(origSi,Math.min(days.length-1,di));
      period.endD=fmt(days[nei]);
    }
    // 子バー変更→親バーを自動拡張
    _expandProcPeriods(proc);
  }else{
    const site=sites.find(x=>x.id===barDrag.siteId);
    const proc=site&&site.processes.find(x=>x.id===barDrag.procId);
    if(!proc)return;
    const period=proc.periods[barDrag.periodIdx];
    if(!period)return;
    const origSN=toN(parseD(barDrag.origStart));
    const origEN=toN(parseD(barDrag.origEnd));
    const origSi=days.findIndex(d=>toN(d)===origSN);
    const origEi=days.findIndex(d=>toN(d)===origEN);
    if(barDrag.type==='move'){
      const delta=di-barDrag.startMouseDi;
      const nsi=Math.max(0,Math.min(days.length-1,origSi+delta));
      const nei=Math.max(0,Math.min(days.length-1,origEi+delta));
      period.startD=fmt(days[nsi]);period.endD=fmt(days[nei]);
    }else if(barDrag.type==='left'){
      const nsi=Math.max(0,Math.min(origEi,di));
      period.startD=fmt(days[nsi]);
    }else{
      const nei=Math.max(origSi,Math.min(days.length-1,di));
      period.endD=fmt(days[nei]);
    }
  }
  render();
});

document.addEventListener('mouseup',function(e){
  if(barDrag.active){
    // 子バードラッグ終了時、親バーを最終同期
    if(barDrag.isChild&&barDrag.procId){

      const proc=site&&site.processes.find(x=>x.id===barDrag.procId);

});

document.addEventListener('mousemove',function(e){
  if(barDrag.active)return;
  if(siteDrag.active){
    document.querySelectorAll('tr.site-drag-over').forEach(r=>r.classList.remove('site-drag-over'));
    // マウス位置の要素から tr.row-site を探す

    const targetEl=document.elementFromPoint(e.clientX,e.clientY);
    const procRow=targetEl?targetEl.closest('tr'):null;
    if(procRow){
      const h=procRow.querySelector(`.sort-handle[data-site="${sortDrag.siteId}"]`);
      if(h){

        else{sortDrag.overProcId=null;}

      }

},true);

document.addEventListener('mouseup',function(e){
  if(barDrag.active)return;
  if(siteDrag.active){
    document.querySelectorAll('tr.site-dragging,tr.site-drag-over').forEach(r=>{r.classList.remove('site-dragging');r.classList.remove('site-drag-over');});
    if(siteDrag.overSiteId!==null&&siteDrag.overSiteId!==siteDrag.siteId){
      const fi=sites.findIndex(x=>x.id===siteDrag.siteId);

      if(fi>=0&&ti>=0){const[m]=sites.splice(fi,1);sites.splice(ti,0,m);}
      saveData();render();
    }
    siteDrag={active:false,siteId:null,overSiteId:null};return;
  }
  if(sortDrag.active){
    document.querySelectorAll('tr.sort-dragging,tr.sort-over').forEach(r=>{r.classList.remove('sort-dragging');r.classList.remove('sort-over');});
    if(sortDrag.overProcId!==null&&sortDrag.overProcId!==sortDrag.procId){
      const site=sites.find(x=>x.id===sortDrag.siteId);
      if(site){
        const fi=site.processes.findIndex(p=>p.id===sortDrag.procId);
        const ti=site.processes.findIndex(p=>p.id===sortDrag.overProcId);
        if(fi>=0&&ti>=0){const[m]=site.processes.splice(fi,1);site.processes.splice(ti,0,m);}
      }
      saveData();render();

    sortDrag={active:false,siteId:null,procId:null,overProcId:null};return;
  }
},true);

function saveChildDone(procId,childId){
  const date=document.getElementById('child_done_date').value;
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    const c=p.children.find(x=>x.id===childId);
    if(c){
      c.done=true;c.doneDate=date;
      // 子項目の期間終了日を完了日に合わせる
      if(date&&c.periods&&c.periods.length>0){
        const lastIdx=c.periods.length-1;
        c.periods[lastIdx].endD=date;
        if(c.periods[lastIdx].startD&&c.periods[lastIdx].startD>date){
          c.periods[lastIdx].startD=date;
        }
      }
      // 全子項目が完了したら親工程も完了、親の期間終了日も更新
      if(p.children.every(x=>x.done)){
        p.done=true;p.doneDate=date;
        if(date&&p.periods&&p.periods.length>0){
          const lastIdx=p.periods.length-1;
          p.periods[lastIdx].endD=date;
          if(p.periods[lastIdx].startD&&p.periods[lastIdx].startD>date){
            p.periods[lastIdx].startD=date;
          }
        }
      }
    }
    break;
  }
  saveData();closeModal();
}

function updateChildFromSel(sel,procId,idx){
  const val=sel.value;
  if(!val)return;

  const row=sel.closest('div');
  const inp=row.querySelector('input[placeholder="工事項目名"]');
  if(inp)inp.value=val;
  updateChild(procId,idx,'name',val);
}

function updateChild(procId,idx,key,val){
  if(procId===null){
    const rows=document.querySelectorAll('#childList > div');
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    if(p.children[idx])p.children[idx][key]=val;break;
  }
  saveData();
}
function updateChildTrackOrder(procId,idx,checked){
  if(procId===null)return;
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    const c=p.children[idx];
    if(!c)break;
    if(checked){
      // 発注管理ON：既に発注済みでなければ未発注（ordered:false）にセット
      if(c.ordered===undefined)c.ordered=false;
    }else{
      // 発注管理OFF：orderedプロパティを削除
      delete c.ordered;
    }
    break;
  }
  saveData();
}
function delChildInModal(procId,idx){
  if(procId===null){
    document.querySelectorAll('#childList > div')[idx]&&document.querySelectorAll('#childList > div')[idx].remove();
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.children.splice(idx,1);break;}
  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openProcModal(site.id,procId);
}

function addChildPeriodInModal(procId,childId){

      <input type="date" style="flex:1;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px;touch-action:manipulation" class="new-child-period-end">
      <button class="btn btn-sm btn-danger" onclick="this.parentNode.remove()">×</button>`;
    list.appendChild(div);
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    const c=p.children.find(x=>x.id===childId);
    if(c){if(!c.periods)c.periods=[];c.periods.push({startD:'',endD:''});}

  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));

function updateChildPeriod(childId,idx,key,val){
  if(childId===null)return;
  for(const s of sites)for(const p of s.processes){
    const c=p.children.find(x=>x.id===childId);
    if(c&&c.periods&&c.periods[idx]){c.periods[idx][key]=val;saveData();return;}
  }
}

function delChildPeriod(procId,childId,idx){
  if(childId===null)return;
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    const c=p.children.find(x=>x.id===childId);
    if(c&&c.periods)c.periods.splice(idx,1);
    break;
  }
  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openChildModal(site.id,procId,childId);
}

function saveChild(procId,childId){
  const name=document.getElementById('c_name').value.trim();if(!name)return;
  const area=document.getElementById('c_area').value.trim();
  const note=document.getElementById('c_note').value.trim();
  const material=document.getElementById('c_material').value.trim();
  // 発注済みチェック：発注管理対象の子項目（既存childにorderedフィールドあり）のみ更新
  const orderedCheckbox=document.getElementById('c_ordered');
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    if(childId===null){
      const newPeriods=[];
      document.querySelectorAll('#childPeriodList > div').forEach(row=>{
        const starts=row.querySelectorAll('.new-child-period-start');
        const ends=row.querySelectorAll('.new-child-period-end');
        if(starts.length&&ends.length&&starts[0].value&&ends[0].value)newPeriods.push({startD:starts[0].value,endD:ends[0].value});
      });
      // 新規追加は子項目モーダル経由では発注管理なし（orderedなし）
      p.children.push({id:nextCid++,name,area,note,material,periods:newPeriods});
    }else{
      const c=p.children.find(x=>x.id===childId);
      if(c){
        Object.assign(c,{name,area,note,material});
        // 発注管理対象のみ ordered を更新
        if(orderedCheckbox&&c.ordered!==undefined){
          c.ordered=orderedCheckbox.checked;
        }
      }
    }
    // 子項目の期間変更 or 追加後、親バーを自動拡張
    _expandProcPeriods(p);
    break;
  }
  saveData();closeModal();
}

function delChild(procId,childId){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    p.children=p.children.filter(x=>x.id!==childId);break;
  }
  saveData();closeModal();
}

function saveSite(id){

  const addr=document.getElementById('s_addr').value.trim();

// =============================================================
// アーカイブ機能
// =============================================================
let _archivedCache=null;  // アーカイブ物件のメモリキャッシュ
let _viewMode='active';   // 'active' or 'archived'
let _activeSitesBackup=null; // アーカイブモード中の現役sites退避
let _archiveMonthsBack=6;    // アーカイブ表示期間（ヶ月）
let _archiveSearch='';       // アーカイブ検索クエリ

async function archiveSite(id){
  if(_viewMode==='archived'){alert('アーカイブ閲覧中は操作できません');return;}
  const s=sites.find(x=>x.id===id);if(!s)return;
  const procs=s.processes||[];
  const allDone=procs.length>0&&procs.every(p=>p.done);
  let msg='この物件をアーカイブしますか？\n\n';
  msg+='物件: '+s.name+'\n';
  if(!allDone&&procs.length>0){
    const notDone=procs.filter(p=>!p.done).length;
    msg+='\n⚠ 未完了の工程が'+notDone+'個あります。\n本当にアーカイブしますか？';
  }else if(procs.length===0){
    msg+='\n⚠ 工程が未登録です。\n本当にアーカイブしますか？';
  }else{
    msg+='\n全'+procs.length+'工程が完了しています。';
  }
  if(!confirm(msg))return;

  showSyncStatus('アーカイブ中…');
  // GASでアーカイブ実行
  const r=await gasArchiveSite(id,'manual');
  if(!r.ok){
    showSyncStatus('アーカイブ失敗',3000);
    alert('アーカイブに失敗しました: '+r.error);
    return;
  }
  // ローカルのsitesからも削除
  sites=sites.filter(x=>x.id!==id);
  // _lastSavedを更新してGAS側と整合
  _lastSaved=JSON.stringify(sites);
  localStorage.setItem('gantt_sites',_lastSaved);
  // キャッシュは無効化（次回閲覧時に再取得）
  _archivedCache=null;
  showSyncStatus('✓ アーカイブしました',3000);
  closeModal();
}

async function unarchiveSite(id){
  if(!confirm('この物件を現役に戻しますか？'))return;
  showSyncStatus('復元中…');
  const r=await gasUnarchiveSite(id);
  if(!r.ok){
    showSyncStatus('復元失敗',3000);
    alert('復元に失敗しました: '+r.error);
    return;
  }
  // キャッシュから該当物件を除去
  if(_archivedCache)_archivedCache=_archivedCache.filter(x=>x.id!==id);
  // 現役側を再読込
  await loadData();
  showSyncStatus('✓ 現役に戻しました',3000);
  // 閲覧中ならアーカイブ画面を再描画
  if(_viewMode==='archived')renderArchiveView();
  else closeModal();
}

// =============================================================
// アーカイブ閲覧モード（ガントチャート流用）
// =============================================================
// _viewMode: 'active'（現役）/ 'archived'（アーカイブ閲覧中）
// _activeSitesBackup: アーカイブモード中、現役sitesの退避先
// _archiveMonthsBack: アーカイブ表示期間（月数、初期6ヶ月）

async function openArchiveView(){
  if(_viewMode==='archived')return; // 既にアーカイブモード

  // 初回ロード
  if(_archivedCache===null){
    showSyncStatus('アーカイブ読込中…');
    const data=await gasLoadArchived();
    if(data===null){
      showSyncStatus('読込失敗',3000);
      alert('アーカイブの読み込みに失敗しました');
      return;
    }
    _archivedCache=data;
    showSyncStatus('✓ 読込完了',1500);
  }

  // 現役を退避してアーカイブモードへ
  _activeSitesBackup=sites;
  _viewMode='archived';
  _archiveMonthsBack=6;
  _archiveSearch='';
  applyArchiveFilter();
  updateArchiveBanner();
  render();
  scrollToToday();
}

function exitArchiveView(){
  if(_viewMode!=='archived')return;
  // 現役データに復帰
  sites=_activeSitesBackup||[];
  _activeSitesBackup=null;
  _viewMode='active';
  updateArchiveBanner();
  render();
  scrollToToday();
}

// アーカイブキャッシュから期間＋検索でフィルタしてsitesに入れる
function applyArchiveFilter(){
  if(_viewMode!=='archived'||!_archivedCache){sites=[];return;}
  // 表示期間: 現在から _archiveMonthsBack ヶ月前まで（完成日ベース）
  const now=new Date();
  const from=new Date(now.getFullYear(),now.getMonth()-_archiveMonthsBack,1);
  const fromN=from.getFullYear()*10000+(from.getMonth()+1)*100+from.getDate();
  const q=(_archiveSearch||'').toLowerCase().trim();

  sites=_archivedCache.filter(s=>{
    // 検索があれば期間無視で全件対象
    if(q){
      const hit=(s.name||'').toLowerCase().includes(q)||(s.addr||'').toLowerCase().includes(q);
      if(!hit)return false;
    }else{
      // 期間フィルタ: koukiEnd が範囲内
      if(!s.koukiEnd)return false; // 完成日なしは検索時のみ表示
      const parts=s.koukiEnd.split('-');
      const kN=parseInt(parts[0])*10000+parseInt(parts[1])*100+parseInt(parts[2]);
      if(kN<fromN)return false;
    }
    return true;
  });
  // 完成日降順（新しい順）
  sites.sort((a,b)=>(b.koukiEnd||'').localeCompare(a.koukiEnd||''));
}

function updateArchiveBanner(){
  let banner=document.getElementById('archiveBanner');
  if(_viewMode!=='archived'){
    if(banner)banner.remove();
    return;
  }
  const total=_archivedCache?_archivedCache.length:0;
  const shown=sites.length;
  const periodLabel=_archiveSearch?'検索結果':('直近'+_archiveMonthsBack+'ヶ月');
  const html=`
    <div id="archiveBanner" style="background:#fff4e0;border:1px solid #f0c168;border-radius:6px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-weight:600;color:#a06000">📦 アーカイブ閲覧中</span>
      <span style="font-size:12px;color:#555">${periodLabel}: ${shown}件 / 全${total}件</span>
      <input id="archSearchInp" placeholder="検索（物件名・所在地）" value="${esc(_archiveSearch||'')}" oninput="onArchiveSearchInput(this.value)" style="height:26px;padding:0 8px;font-size:12px;border:1px solid #ccc;border-radius:6px;min-width:180px">
      ${_archiveSearch?'':`<button class="btn btn-sm" onclick="expandArchivePeriod()" title="表示期間を1年延長">＋ もっと古い期間</button>`}
      <button class="btn btn-sm" onclick="reloadArchivedData()" title="再読込">🔄</button>
      <button class="btn btn-sm btn-primary" onclick="exitArchiveView()" style="margin-left:auto">◀ 現役に戻る</button>
    </div>`;
  const tmp=document.createElement('div');
  tmp.innerHTML=html.trim();
  const newBanner=tmp.firstElementChild;
  if(banner){
    banner.replaceWith(newBanner);
  }else{
    const container=document.querySelector('.container');
    const outer=document.querySelector('.gantt-outer');
    if(container&&outer)container.insertBefore(newBanner,outer);
  }
}

let _archiveSearchTimer=null;

  _archiveSearch=v;

}

function expandArchivePeriod(){
  _archiveMonthsBack+=12;

  updateArchiveBanner();

}

async function reloadArchivedData(){
  _archivedCache=null;
  showSyncStatus('再読込中…');

  if(data===null){showSyncStatus('読込失敗',3000);return;}
  _archivedCache=data;
  applyArchiveFilter();
  updateArchiveBanner();
  render();
  showSyncStatus('✓ 読込完了',1500);
}
