<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;background:#f5f5f5;color:#111}
header{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
header h1{font-size:15px;font-weight:600;color:#0C447C}
header a{font-size:12px;color:#888;text-decoration:none;margin-left:auto}
header a:hover{color:#185FA5}
.container{padding:10px 16px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 0 8px;border-bottom:1px solid #ddd;margin-bottom:8px}
.toolbar label{font-size:12px;color:#888}
.toolbar input[type=date]{font-size:12px;height:30px;padding:0 6px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111}
.btn{height:28px;padding:0 12px;font-size:12px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.btn:hover{background:#f0f0f0}
.btn-sm{height:22px;padding:0 7px;font-size:11px}
.btn-primary{background:#e6f1fb;color:#185FA5;border-color:#85B7EB}
.btn-danger{color:#c00;border-color:#ecc}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 0 8px;border-bottom:1px solid #ddd;margin-bottom:8px}
.filter-bar label{font-size:11px;color:#888}
.filter-bar select{font-size:11px;height:26px;padding:0 6px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;min-width:110px}
.gantt-outer{border:1px solid #ccc;border-radius:8px;overflow:hidden;background:#fff}
.gantt-scroll{overflow-x:auto;overflow-y:auto;max-height:75vh}
table{border-collapse:collapse;min-width:100%;font-size:12px;table-layout:fixed}
.col-info{width:300px;min-width:300px;position:sticky;left:0;z-index:10}
.day-col{width:26px;min-width:26px}
thead th{position:sticky;top:0;z-index:20;background:#f0f0ee;border-bottom:1px solid #bbb;border-right:1px solid #ddd;padding:2px 0;text-align:center;font-weight:500;color:#555;white-space:nowrap}
thead th.col-info{z-index:30;text-align:left;padding:0 8px;font-size:12px}
thead th.wk{color:#E24B4A}
thead th.tod{font-weight:700}
tr.row-site td{background:#dce8f5}
tr.row-proc td{background:#fff}
tr.row-proc.done td{background:#f5f5f3}
tr.row-kouki td{background:#f9f5ee}
tr.row-kouki td.wk-cell{background:#f4eedf}
tr.row-site td.wk-cell{background:#ccd6e8}
tr.row-proc td.wk-cell{background:#f5f5f2}
td.tod-cell{background:rgba(50,180,100,0.15)!important}
.badge-warn{font-size:10px;background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;border-radius:10px;padding:1px 6px;font-weight:600;flex-shrink:0}
.badge-procwarn{font-size:10px;background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A;border-radius:10px;padding:1px 6px;font-weight:600;flex-shrink:0}
tr.site-warn td{background:#fff5f5!important}
tr.site-warn td.wk-cell{background:#ffe8e8!important}
tr.site-warn .col-info{border-left:3px solid #E24B4A!important}
tr.proc-warn td{background:#fff5f5!important}
tr.proc-warn td.wk-cell{background:#ffe8e8!important}
tr.proc-warn .col-info{border-left:3px solid #E24B4A!important}
.sort-handle{font-size:13px;color:#bbb;cursor:grab;flex-shrink:0;padding:0 3px;user-select:none;line-height:1}
.sort-handle:hover{color:#888}
.sort-handle-site{font-size:14px;color:#7aabcf;cursor:grab;flex-shrink:0;padding:0 3px;user-select:none;line-height:1}
.sort-handle-site:hover{color:#185FA5}
tr.row-proc.sort-dragging td{background:#e8f4ff!important;opacity:0.6}
tr.row-proc.sort-over td{border-top:2px solid #4A90D9!important}
tr.row-site.site-dragging td{background:#c5d9ed!important;opacity:0.6}
tr.row-site.site-drag-over td{border-top:3px solid #0C447C!important}
td{padding:0;border-bottom:1px solid #ddd;border-right:1px solid #e8e8e8;vertical-align:middle;overflow:hidden}
td.col-info{border-right:1px solid #bbb;padding:0}
td.day-cell{width:26px;min-width:26px;padding:0;position:relative}
td.day-cell.drag-over{background:rgba(74,144,217,0.15)!important}
.site-inner{display:flex;flex-direction:column;justify-content:center;padding:0 6px 0 4px;height:100%;gap:1px}
.site-top{display:flex;align-items:center;gap:3px;line-height:1}
.toggle{cursor:pointer;font-size:12px;color:#555;user-select:none;flex-shrink:0;width:14px;text-align:center}
.site-name{font-weight:600;color:#0C447C;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;cursor:pointer}
.site-sub{font-size:10px;color:#185FA5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:16px}
.badge-nd{font-size:10px;background:#FAEEDA;color:#854F0B;border-radius:10px;padding:1px 5px;flex-shrink:0}
.proc-inner{display:flex;align-items:center;gap:4px;padding:0 4px 0 8px;height:100%;overflow:hidden}
.chk{width:22px;height:22px;border-radius:4px;border:1.5px solid #bbb;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;touch-action:manipulation}
.chk.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.proc-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proc-name.done{text-decoration:line-through;color:#aaa}
.badge-nodate{font-size:10px;background:#FAEEDA;color:#854F0B;border-radius:10px;padding:0 5px;flex-shrink:0}
.proc-meta{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.field input,.field select{width:100%;font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #ccc}
.field input:focus,.field select:focus{outline:none;border-color:#85B7EB}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.color-palette{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0}
.color-swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#333;transform:scale(1.15)}

.master-section{margin-bottom:14px}
.master-section h4{font-size:12px;font-weight:600;color:#555;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}
.master-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;margin-bottom:6px}
.master-item{display:flex;align-items:center;gap:6px;font-size:12px}
.master-item span{flex:1}
.master-item button{height:20px;padding:0 6px;font-size:10px;border-radius:4px;border:1px solid #ecc;background:#fff;color:#c00;cursor:pointer}
.master-add{display:flex;gap:6px}
.master-add input{flex:1;font-size:12px;padding:4px 6px;border-radius:6px;border:1px solid #ccc;height:28px}
.master-add button{height:28px;padding:0 10px;font-size:12px;border-radius:6px;border:1px solid #85B7EB;background:#e6f1fb;color:#185FA5;cursor:pointer;white-space:nowrap}


</style>
</head>
<body>
<header>
  <h1>リフォーム工程表</h1>
  <button class="btn btn-sm" onclick="openMasterModal()" style="margin-left:auto">⚙ マスター</button>
  <button id="undoBtn" class="btn btn-sm" onclick="undoLast()" disabled title="元に戻す">↩</button>
  <span id="syncStatus" style="font-size:11px;color:#888;white-space:nowrap"></span>
  <a href="FudosanCRM.html" style="font-size:12px;color:#888;text-decoration:none">← CRM</a>
</header>
<div class="container">
  <div class="toolbar">
    <label>表示開始</label><input type="date" id="startDate">
    <label>終了</label><input type="date" id="endDate">
    <button class="btn" onclick="applyRange()">適用</button>
    <button class="btn btn-primary" onclick="openSiteModal(null)">＋ 物件追加</button>
    <button class="btn" onclick="exportCSV()">CSV出力</button>
  </div>
  <div class="filter-bar">
    <label>元受</label><select id="filterClient" onchange="render()"><option value="">すべて</option></select>
    <label>担当者</label><select id="filterPerson" onchange="render()"><option value="">すべて</option></select>
    <button class="btn btn-sm" onclick="clearFilters()">リセット</button>
    <span style="margin-left:8px;border-left:1px solid #ddd;padding-left:12px;display:flex;align-items:center;gap:6px">
      <label style="color:#c0392b;font-weight:500">⚠ 完成</label>
      <input type="number" id="warnDays" value="3" min="1" max="30" style="width:48px;height:26px;font-size:12px;border:1px solid #ccc;border-radius:6px;padding:0 6px;text-align:center" onchange="render()">
      <label style="color:#c0392b">日以内で未発注工程あり</label>
    </span>
  </div>
  <div class="gantt-outer">
    <div class="gantt-scroll" id="ganttScroll">
      <table id="ganttTable"><thead id="ganttHead"></thead><tbody id="ganttBody"></tbody></table>
    </div>
  </div>
</div>
<div id="modalEl"></div>

<script>
const PC=['#4A90D9','#27AE60','#E74C3C','#8E44AD','#E67E22','#16A085','#2980B9','#7F8C8D',
  '#F39C12','#1ABC9C','#C0392B','#9B59B6','#2ECC71','#E91E63','#00BCD4','#FF5722',
  '#607D8B','#795548','#3F51B5','#009688'];
const CNAMES=['青','緑','赤','紫','オレンジ','深緑','水色','グレー',
  '黄','エメラルド','濃赤','薄紫','ライム','ピンク','シアン','朱',
  'スレート','ブラウン','インディゴ','ティール'];
const SITE_H=40,ROW_H=26,DAY_W=26;

// 日本の祝日
const HOLIDAYS=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2025-12-23',
'2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2026-12-23',
'2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19','2027-08-11','2027-09-20','2027-09-23','2027-10-11','2027-11-03','2027-11-23','2027-12-23']);
function isHoliday(d){return HOLIDAYS.has(fmt(d));}


function toN(d){return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
function parseD(s){if(!s)return null;let p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(s){if(!s)return'';const d=parseD(s);return(d.getMonth()+1)+'/'+d.getDate();}
function addDays(d,n){let r=new Date(d);r.setDate(r.getDate()+n);return r}
function isWk(d){return d.getDay()===0||d.getDay()===6}
function isToday(d){return toN(d)===toN(new Date())}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}
function lighten(hex,amt){const[r,g,b]=hexToRgb(hex);return'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')';}
function darken(hex,amt){const[r,g,b]=hexToRgb(hex);return'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')';}

let viewStart,viewEnd;
(function(){
  let n=new Date(),y=n.getFullYear(),m=n.getMonth();
  viewStart=new Date(y,m,1);viewEnd=new Date(y,m+2,0);
  document.getElementById('startDate').value=fmt(viewStart);
  document.getElementById('endDate').value=fmt(viewEnd);
})();

let sites=[];
let nextSid=100,nextPid=1000,nextCid=10000;
let masters={clients:[],persons:[],procNames:[]};
const GAS_URL='https://script.google.com/macros/s/AKfycbxOI40LdSvyva9VFC8J04qpvqlCqqkf1eMx3QlDY0ecjjrWCDbEUEtpe-UHjapoqI0/exec';
async function gasLoad(key){try{const r=await fetch(GAS_URL+'?action=load&key='+encodeURIComponent(key));const j=await r.json();return j.ok?j.value:null;}catch(e){return null;}}
async function gasSave(key,val){try{const r=await fetch(GAS_URL,{method:'POST',body:new URLSearchParams({action:'save',key,value:JSON.stringify(val)})});const j=await r.json();return j.ok;}catch(e){return false;}}
let _syncTimer=null;
function showSyncStatus(msg,ms){const el=document.getElementById('syncStatus');if(el)el.textContent=msg;if(_syncTimer)clearTimeout(_syncTimer);if(ms)_syncTimer=setTimeout(()=>{if(el)el.textContent='';},ms);}

function loadMasters(){
  try{const d=localStorage.getItem('gantt_masters');if(d)masters=JSON.parse(d);}catch(e){}
  if(!masters.clients.length)masters.clients=['有限会社彩建'];
  if(!masters.persons.length)masters.persons=['秀力内装','岩瀬畳店','大川龍真','Eサービス'];
  if(!masters.procNames.length)masters.procNames=['クロス','畳表替え','フローリング','クリーニング','エアコン新設','コーキング','雑工事','水回り'];
  gasLoad('gantt_masters').then(v=>{if(v)try{masters=JSON.parse(v);}catch(e){}});
}
function saveMasters(){localStorage.setItem('gantt_masters',JSON.stringify(masters));gasSave('gantt_masters',masters);}

function normalizeSites(raw){
  raw.forEach(s=>s.processes.forEach(p=>{
    if(!p.periods){p.periods=[];if(p.startD||p.endD)p.periods.push({startD:p.startD||'',endD:p.endD||''});delete p.startD;delete p.endD;}
    if(!p.children)p.children=[];
  }));
  nextSid=Math.max(nextSid,...raw.map(s=>s.id))+1;
  const pids=raw.flatMap(s=>s.processes.map(p=>p.id));if(pids.length)nextPid=Math.max(nextPid,...pids)+1;
  const cids=raw.flatMap(s=>s.processes.flatMap(p=>(p.children||[]).map(c=>c.id)));if(cids.length)nextCid=Math.max(nextCid,...cids)+1;
  return raw;
}
async function loadData(){
  try{const d=localStorage.getItem('gantt_sites');if(d){sites=normalizeSites(JSON.parse(d));render();}}catch(e){}
  showSyncStatus('読み込み中…');
  const v=await gasLoad('gantt_sites');
  if(v){try{sites=normalizeSites(JSON.parse(v));localStorage.setItem('gantt_sites',v);render();showSyncStatus('✓ 同期済み',2000);}catch(e){showSyncStatus('読込エラー',3000);}}
  else{showSyncStatus('（オフライン）',3000);}
  if(!sites.length)sites=[
    {id:1,name:'マンションハピネスI 201',addr:'埼玉県越谷市東大沢1-5-10',client:'有限会社彩建',collapsed:false,koukiStart:'2026-04-03',koukiEnd:'2026-04-14',dropboxUrl:'',processes:[
      {id:101,name:'内装工事',person:'秀力内装',area:'',periods:[{startD:'2026-04-03',endD:'2026-04-07'}],done:false,color:PC[0],children:[
        {id:1011,name:'クロス貼替',area:'148m²'},
        {id:1012,name:'CF貼替',area:'32m²'},
        {id:1013,name:'ソフト巾木',area:'30m'},
      ]},
      {id:102,name:'畳表替え',person:'岩瀬畳店',area:'',periods:[{startD:'2026-04-05',endD:'2026-04-10'}],done:false,color:PC[1],children:[]},
      {id:103,name:'エアコン新設',person:'大川龍真',area:'',periods:[{startD:'2026-04-09',endD:'2026-04-09'}],done:true,color:PC[2],children:[]},
      {id:104,name:'クリーニング',person:'Eサービス',area:'3DK',periods:[],done:false,color:PC[5],children:[]},
    ]},
    {id:2,name:'ラバネストヒル2号館 203',addr:'埼玉県和光市南1-26-25',client:'有限会社彩建',collapsed:false,koukiStart:'2026-04-07',koukiEnd:'2026-04-18',dropboxUrl:'',processes:[
      {id:201,name:'クロス貼替',person:'有限会社彩建',area:'100m²',periods:[{startD:'2026-04-07',endD:'2026-04-14'}],done:false,color:PC[0]},
      {id:202,name:'コーキング',person:'大川龍真',area:'',periods:[{startD:'2026-04-15',endD:'2026-04-17'}],done:false,color:PC[4]},
      {id:203,name:'雑工事',person:'',area:'',periods:[],done:false,color:PC[7]},
    ]},
  ];
}
let _undoStack=[];
let _lastSaved=null;
function saveData(){
  // 保存前の状態をundoスタックに積む
  if(_lastSaved!==null){
    _undoStack.push(_lastSaved);
    if(_undoStack.length>20)_undoStack.shift();
    const el=document.getElementById('undoBtn');if(el)el.disabled=false;
  }
  _lastSaved=JSON.stringify(sites);
  localStorage.setItem('gantt_sites',_lastSaved);showSyncStatus('保存中…');gasSave('gantt_sites',sites).then(ok=>showSyncStatus(ok?'✓ 保存済み':'保存失敗',2000));
}
function undoLast(){
  if(!_undoStack.length)return;
  const prev=_undoStack.pop();
  _lastSaved=prev;
  sites=normalizeSites(JSON.parse(prev));
  localStorage.setItem('gantt_sites',prev);
  showSyncStatus('元に戻しました',2000);gasSave('gantt_sites',sites);
  const el=document.getElementById('undoBtn');if(el)el.disabled=_undoStack.length===0;
  render();
}

function getDays(){
  let days=[],d=new Date(viewStart);
  while(toN(d)<=toN(viewEnd)){days.push(new Date(d));d=addDays(d,1);}
  return days;
}

function rebuildSelects(){
  const fc=document.getElementById('filterClient'),fp=document.getElementById('filterPerson');
  const cv=fc.value,pv=fp.value;
  fc.innerHTML='<option value="">すべて</option>'+[...new Set(sites.map(s=>s.client).filter(Boolean))].sort().map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');
  fp.innerHTML='<option value="">すべて</option>'+[...new Set(sites.flatMap(s=>s.processes.map(p=>p.person)).filter(Boolean))].sort().map(p=>'<option value="'+esc(p)+'">'+esc(p)+'</option>').join('');
  fc.value=cv;fp.value=pv;
}

// ドラッグ状態
let barDrag={active:false,type:'move',procId:null,periodIdx:null,siteId:null,startMouseDi:null,origStart:null,origEnd:null,isKouki:false,isNew:false};

function makeBar(col,spanCount,label,isDone,isShort){
  const bar=document.createElement('div');
  bar.style.cssText=`position:absolute;top:3px;bottom:3px;left:0;width:${spanCount*DAY_W}px;z-index:2;display:flex;align-items:center;overflow:visible;border-radius:3px;cursor:grab;user-select:none;`;
  if(isDone){
    bar.style.background='linear-gradient(to bottom,#ccc,#aaa)';
    bar.style.boxShadow='inset 0 0 0 2px #888';
  }else{
    bar.style.background='linear-gradient(to bottom,'+lighten(col,60)+' 0%,'+lighten(col,20)+' 45%,'+darken(col,20)+' 55%,'+darken(col,40)+' 100%)';
    bar.style.boxShadow='inset 0 0 0 1px #f5c800';
  }
  // 左リサイズハンドル
  const lh=document.createElement('div');
  lh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:#f5c800;border-radius:3px 0 0 3px;opacity:0.85;';
  lh.dataset.handle='left';
  bar.appendChild(lh);
  // ラベル
  const lbl=document.createElement('span');
  lbl.style.cssText='font-size:11px;font-weight:500;color:#fff;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;pointer-events:none;text-shadow:0 1px 1px rgba(0,0,0,0.3)';
  lbl.textContent=label;
  bar.appendChild(lbl);
  // 右リサイズハンドル
  const rh=document.createElement('div');
  rh.style.cssText='width:6px;height:100%;cursor:ew-resize;flex-shrink:0;background:#f5c800;border-radius:0 3px 3px 0;opacity:0.85;';
  rh.dataset.handle='right';
  bar.appendChild(rh);
  // バー短い時は右外にラベル
  if(isShort){
    const ol=document.createElement('div');
    ol.style.cssText=`position:absolute;top:4px;left:${spanCount*DAY_W+3}px;font-size:11px;font-weight:500;color:#444;white-space:nowrap;pointer-events:none;z-index:3`;
    ol.textContent=label;
    bar.appendChild(ol);
  }
  return bar;
}

function render(){
  rebuildSelects();
  const fc=document.getElementById('filterClient').value;
  const fp=document.getElementById('filterPerson').value;
  const days=getDays();

  let headHtml='<tr><th class="col-info" style="height:36px"><div style="display:flex;align-items:center;gap:4px;padding:0 8px">物件 / 工程<span style="margin-left:auto;display:flex;gap:3px"><button onclick="expandAll()" style="height:18px;padding:0 5px;font-size:11px;border-radius:4px;border:1px solid #bbb;background:#fff;cursor:pointer;line-height:1" title="全展開">＋</button><button onclick="collapseAll()" style="height:18px;padding:0 5px;font-size:11px;border-radius:4px;border:1px solid #bbb;background:#fff;cursor:pointer;line-height:1" title="全縮小">－</button></span></div></th>';
  days.forEach(day=>{
    const wk=isWk(day),tod=isToday(day),hol=isHoliday(day);
    const wd=['日','月','火','水','木','金','土'][day.getDay()];
    const isSat=day.getDay()===6,isSunOrHol=day.getDay()===0||hol;
    const dayColor=isSat?(tod?'color:#2980B9;font-weight:700':'color:#2980B9'):isSunOrHol?(tod?'color:#E24B4A;font-weight:700':'color:#E24B4A'):tod?'font-weight:700':'';
    headHtml+=`<th class="day-col${wk?' wk':''}" style="height:36px;${dayColor}">${day.getDate()}<br><span style="font-size:9px">${wd}</span></th>`;
  });
  headHtml+='</tr>';
  document.getElementById('ganttHead').innerHTML=headHtml;

  const frag=document.createDocumentFragment();
  const warnDays=parseInt(document.getElementById('warnDays').value)||3;
  const todayN=toN(new Date());

  sites.filter(site=>{
    if(fc&&site.client!==fc)return false;
    if(fp&&!site.processes.some(p=>p.person===fp))return false;
    return true;
  }).forEach(site=>{
    const procs=site.processes.filter(p=>fp?p.person===fp:true);
    const nd=procs.filter(p=>!p.periods||!p.periods.length).length;
    const mapUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(site.addr);
    const hasUnset=site.processes.some(p=>!p.periods||!p.periods.length);
    const koukiEndN=site.koukiEnd?toN(parseD(site.koukiEnd)):null;
    const isWarn=hasUnset&&koukiEndN!==null&&koukiEndN>=todayN&&koukiEndN<=toN(addDays(new Date(),warnDays));

    // 物件行
    const siteRow=document.createElement('tr');
    siteRow.className='row-site'+(isWarn?' site-warn':'');
    siteRow.style.height=SITE_H+'px';
    const siteTd=document.createElement('td');
    siteTd.className='col-info';
    const ndBadge=nd>0?`<span class="badge-nd">未定${nd}</span>`:'';
    const warnBadge=isWarn?'<span class="badge-warn">⚠ 発注未完了</span>':'';
    const dropboxBtn=site.dropboxUrl?`<a href="${site.dropboxUrl}" target="_blank" class="btn btn-sm" style="flex-shrink:0;text-decoration:none">📁</a>`:'';
    const clientStr=site.client?'　'+esc(site.client):'';
    siteTd.innerHTML=`<div class="site-inner"><div class="site-top">
      <span class="sort-handle-site" data-site="${site.id}" title="ドラッグで並び替え">⠿</span>
      <span class="toggle" onclick="toggleSite(${site.id})">${site.collapsed?'▶':'▼'}</span>
      <span class="site-name" onclick="toggleSite(${site.id})">${esc(site.name)}</span>
      ${ndBadge}${warnBadge}${dropboxBtn}
      <button class="btn btn-sm" style="flex-shrink:0" onclick="openSiteModal(${site.id})">編集</button>
      <button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="openProcModal(${site.id},null)">＋</button>
      </div>
      <div class="site-sub">${esc(site.addr)}<a href="${mapUrl}" style="color:#185FA5;font-size:10px;margin-left:3px" target="_blank">地図</a>${clientStr}</div>
      ${site.keyLocation?`<div class="site-sub site-key">🔑 ${esc(site.keyLocation)}</div>`:''}
      </div>`;
    siteRow.appendChild(siteTd);
    days.forEach(day=>{
      const td=document.createElement('td');
      td.className='day-cell'+(isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
      siteRow.appendChild(td);
    });
    frag.appendChild(siteRow);

    // 工期行
    const koukiRow=document.createElement('tr');
    koukiRow.className='row-kouki';
    koukiRow.style.height=ROW_H+'px';
    const koukiTd=document.createElement('td');
    koukiTd.className='col-info';
    const ks=site.koukiStart,ke=site.koukiEnd;
    koukiTd.innerHTML=`<div class="proc-inner" style="padding-left:8px;cursor:pointer" onclick="openKoukiModal(${site.id})"><span style="font-size:11px;color:#555;font-weight:500">工期</span><span style="font-size:10px;color:#888;margin-left:6px">${(ks&&ke)?fmtD(ks)+' 〜 '+fmtD(ke):'<span style="color:#185FA5">＋設定</span>'}</span></div>`;
    koukiRow.appendChild(koukiTd);
    const koukiCells=[];
    days.forEach((day,di)=>{
      const td=document.createElement('td');
      td.className='day-cell'+(isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
      td.dataset.kouki=site.id;td.dataset.di=di;
      // 空きセルを長押しでドラッグ開始（クリックだけでは反応しない）
      let _koukiLpt=null;
      td.onmousedown=(e)=>{
        if(e.target.closest('[data-handle]'))return;
        e.preventDefault();
        const d=days[di];
        _koukiLpt=setTimeout(()=>{
          const s2=sites.find(x=>x.id===site.id);
          if(s2){s2.koukiStart=fmt(d);s2.koukiEnd=fmt(d);}
          barDrag={active:true,type:'right',isKouki:true,siteId:site.id,procId:null,periodIdx:null,
            origStart:fmt(d),origEnd:fmt(d),startMouseDi:null};
          render();
        },400);
      };
      td.onmouseup=()=>{if(_koukiLpt){clearTimeout(_koukiLpt);_koukiLpt=null;}};
      td.onmouseleave=()=>{if(_koukiLpt){clearTimeout(_koukiLpt);_koukiLpt=null;}};
      koukiRow.appendChild(td);
      koukiCells.push(td);
    });
    if(ks&&ke){
      const ksN=toN(parseD(ks)),keN=toN(parseD(ke));
      const si=days.findIndex(d=>toN(d)===ksN);
      const ei=days.findIndex(d=>toN(d)===keN);
      const asi=si>=0?si:(toN(days[0])>ksN?0:-1);
      const aei=ei>=0?ei:(toN(days[days.length-1])<keN?days.length-1:-1);
      if(asi>=0&&aei>=0){
        const cells=koukiRow.querySelectorAll('td.day-cell');
        const sc=cells[asi];
        if(sc){
          sc.style.position='relative';sc.style.overflow='visible';
          const span=aei-asi+1;
          const bar=makeBar('#3949ab',span,'工期',false,span<=3);
          bar.style.cursor='pointer';
          bar.onclick=()=>openKoukiModal(site.id);
          bar.onmousedown=(e)=>{
            if(e.target.dataset.handle)return;
            e.preventDefault();
            barDrag={active:true,type:'move',isKouki:true,siteId:site.id,procId:null,periodIdx:null,
              startMouseDi:asi+Math.floor((e.clientX-sc.getBoundingClientRect().left)/DAY_W),
              origStart:ks,origEnd:ke};
          };
          bar.querySelector('[data-handle="left"]').onmousedown=(e)=>{e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'left',isKouki:true,siteId:site.id,procId:null,periodIdx:null,origStart:ks,origEnd:ke,startMouseDi:null};};
          bar.querySelector('[data-handle="right"]').onmousedown=(e)=>{e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'right',isKouki:true,siteId:site.id,procId:null,periodIdx:null,origStart:ks,origEnd:ke,startMouseDi:null};};
          sc.appendChild(bar);
        }
      }
    }
    frag.appendChild(koukiRow);

    if(!site.collapsed){
      procs.forEach(proc=>{
        const periods=proc.periods||[];
        const hasPeriod=periods.some(p=>p.startD&&p.endD);
        const procWarn=isWarn&&!hasPeriod;

        const procRow=document.createElement('tr');
        procRow.className='row-proc'+(proc.done?' done':procWarn?' proc-warn':'');
        procRow.style.height=ROW_H+'px';
        const procTd=document.createElement('td');
        procTd.className='col-info';
        const meta=proc.person||'';
        const nodateBadge=procWarn?'<span class="badge-procwarn">⚠ 未発注</span>':(!hasPeriod?'<span class="badge-nodate">未定</span>':'');
        const children=proc.children||[];
        const hasChildren=children.length>0;
        const childCollapsed=proc.childCollapsed||false;
        const toggleIcon=hasChildren?(childCollapsed?'▶':'▼'):'';
        procTd.innerHTML=`<div class="proc-inner">
          <span class="sort-handle" data-proc="${proc.id}" data-site="${site.id}" title="ドラッグで並び替え">⠿</span>
          <div class="chk${proc.done?' done':''}" onclick="toggleDone(${proc.id})">${proc.done?'✓':''}</div>
          ${hasChildren?`<span style="cursor:pointer;font-size:11px;color:#888;flex-shrink:0;width:12px" onclick="toggleChildren(${proc.id})">${toggleIcon}</span>`:'<span style="width:12px;flex-shrink:0"></span>'}
          <span class="proc-name${proc.done?' done':''}">${esc(proc.name)}</span>
          ${nodateBadge}
          <span class="proc-meta">${esc(meta)}</span>
          <button class="btn btn-sm" style="flex-shrink:0" onclick="openProcModal(${site.id},${proc.id})">編集</button>
          <button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="openChildModal(${site.id},${proc.id},null)" title="子項目追加">＋</button>
          </div>`;
        procRow.appendChild(procTd);

        const dayCells=[];
        days.forEach((day,di)=>{
          const td=document.createElement('td');
          td.className='day-cell'+(proc.done?' wk-cell':isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
          td.dataset.proc=proc.id;td.dataset.site=site.id;td.dataset.di=di;
          procRow.appendChild(td);
          dayCells.push(td);
        });

        // 各periodのバーを描画
        periods.forEach((period,pi)=>{
          if(!period.startD||!period.endD)return;
          const psN=toN(parseD(period.startD));
          const peN=toN(parseD(period.endD));
          const si=days.findIndex(d=>toN(d)===psN);
          const ei=days.findIndex(d=>toN(d)===peN);
          const asi=si>=0?si:(toN(days[0])>psN?0:-1);
          const aei=ei>=0?ei:(toN(days[days.length-1])<peN?days.length-1:-1);
          if(asi<0||aei<0)return;
          const sc=dayCells[asi];
          if(!sc)return;
          sc.style.position='relative';sc.style.overflow='visible';
          const span=aei-asi+1;
          const col=proc.done?'#999':proc.color;
          const bar=makeBar(col,span,proc.name,proc.done,span<=3);
          bar.dataset.procId=proc.id;bar.dataset.siteId=site.id;
          bar.onclick=(e)=>{if(e.target.dataset.handle)return;openProcModal(site.id,proc.id);};
          bar.onmousedown=(e)=>{
            if(e.target.dataset.handle)return;
            e.preventDefault();
            const cellRect=sc.getBoundingClientRect();
            barDrag={active:true,type:'move',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,
              startMouseDi:asi+Math.floor((e.clientX-cellRect.left)/DAY_W),
              origStart:period.startD,origEnd:period.endD};
          };
          bar.querySelector('[data-handle="left"]').onmousedown=(e)=>{
            e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'left',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,origStart:period.startD,origEnd:period.endD,startMouseDi:null};
          };
          bar.querySelector('[data-handle="right"]').onmousedown=(e)=>{
            e.preventDefault();e.stopPropagation();
            barDrag={active:true,type:'right',isKouki:false,siteId:site.id,procId:proc.id,periodIdx:pi,origStart:period.startD,origEnd:period.endD,startMouseDi:null};
          };
          // PCホバーで子項目ツールチップ
          if(children.length>0){
            bar.addEventListener('mouseenter',function(ev){
              let tip=document.getElementById('childTip');
              if(!tip){tip=document.createElement('div');tip.id='childTip';tip.style.cssText='position:fixed;z-index:3000;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.15);padding:8px 12px;font-size:11px;min-width:140px;pointer-events:none';document.body.appendChild(tip);}
              tip.innerHTML='<div style="font-weight:600;color:#0C447C;margin-bottom:4px">'+esc(proc.name)+'</div>'+children.map(c=>'<div style="color:#555;padding:2px 0;border-bottom:1px solid #f0f0f0">└ '+esc(c.name)+(c.area?' <span style="color:#aaa">'+esc(c.area)+'</span>':'')+'</div>').join('');
              tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';
              tip.style.top=Math.max(ev.clientY-20,4)+'px';
              tip.style.display='block';
            });
            bar.addEventListener('mousemove',function(ev){
              const tip=document.getElementById('childTip');
              if(tip){tip.style.left=Math.min(ev.clientX+12,window.innerWidth-180)+'px';tip.style.top=Math.max(ev.clientY-20,4)+'px';}
            });
            bar.addEventListener('mouseleave',function(){
              const tip=document.getElementById('childTip');if(tip)tip.style.display='none';
            });
          }
          sc.appendChild(bar);
        });

        // 空きセルのmousedownで新しいperiodのドラッグ開始
        dayCells.forEach((td,di)=>{
          td.onmousedown=(e)=>{
            if(e.target.closest('[data-handle]')||e.target.closest('.bar'))return;
            e.preventDefault();
            const d=days[di];
            barDrag={active:true,type:'right',isKouki:false,isNew:true,
              siteId:site.id,procId:proc.id,periodIdx:-1,
              startMouseDi:di,origStart:fmt(d),origEnd:fmt(d)};
            // 仮periodを追加
            const site2=sites.find(x=>x.id===site.id);
            const proc2=site2&&site2.processes.find(x=>x.id===proc.id);
            if(proc2){proc2.periods.push({startD:fmt(d),endD:fmt(d)});barDrag.periodIdx=proc2.periods.length-1;}
            render();
          };
        });

        frag.appendChild(procRow);

        // 子項目行
        if(!proc.childCollapsed&&children.length>0){
          children.forEach(child=>{
            const childRow=document.createElement('tr');
            childRow.className='row-proc'+(proc.done?' done':'');
            childRow.style.height='22px';
            const childTd=document.createElement('td');
            childTd.className='col-info';
            childTd.innerHTML=`<div class="proc-inner" style="padding-left:28px">
              <span style="font-size:10px;color:#aaa;flex-shrink:0;padding-right:4px">└</span>
              <div class="chk${child.done?' done':''}" onclick="toggleChildDone(${proc.id},${child.id})" style="width:16px;height:16px;font-size:10px;flex-shrink:0">${child.done?'✓':''}</div>
              <span style="font-size:11px;color:${child.done?'#aaa':'#555'};flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${child.done?'text-decoration:line-through':''}">${esc(child.name)}${child.area?' <span style="color:#aaa">'+esc(child.area)+'</span>':''}${child.note?' <span style="color:#aaa;font-size:10px">'+esc(child.note)+'</span>':''}</span>
              <button class="btn btn-sm" style="flex-shrink:0;font-size:10px;height:18px;padding:0 5px" onclick="openChildModal(${site.id},${proc.id},${child.id})">編集</button>
              </div>`;
            childRow.appendChild(childTd);
            const childDayCells=[];
            days.forEach((day,di)=>{
              const td=document.createElement('td');
              td.className='day-cell'+(proc.done?' wk-cell':isToday(day)?' tod-cell':(isWk(day)||isHoliday(day))?' wk-cell':'');
              childRow.appendChild(td);
              childDayCells.push(td);
            });
            // 子項目バー（親工程と同じperiodでバーを表示）
            periods.forEach((period,pi)=>{
              if(!period.startD||!period.endD)return;
              const psN=toN(parseD(period.startD));
              const peN=toN(parseD(period.endD));
              const si=days.findIndex(d=>toN(d)===psN);
              const ei=days.findIndex(d=>toN(d)===peN);
              const asi=si>=0?si:(toN(days[0])>psN?0:-1);
              const aei=ei>=0?ei:(toN(days[days.length-1])<peN?days.length-1:-1);
              if(asi<0||aei<0)return;
              const sc=childDayCells[asi];
              if(!sc)return;
              sc.style.position='relative';sc.style.overflow='visible';
              const span=aei-asi+1;
              const col=proc.done?'#999':proc.color;
              const cbar=document.createElement('div');
              const _dw=sc.getBoundingClientRect().width||DAY_W;
              cbar.style.cssText=`position:absolute;top:3px;bottom:3px;left:0;width:${span*_dw}px;z-index:2;display:flex;align-items:center;overflow:visible;border-radius:3px;pointer-events:none;`;
              if(proc.done){
                cbar.style.background='linear-gradient(to bottom,#ccc,#aaa)';
                cbar.style.boxShadow='inset 0 0 0 2px #888';
              }else{
                cbar.style.background='linear-gradient(to bottom,'+lighten(col,60)+' 0%,'+lighten(col,20)+' 45%,'+darken(col,20)+' 55%,'+darken(col,40)+' 100%)';
                cbar.style.boxShadow='inset 0 0 0 1px #f5c800';
              }
              const clbl=document.createElement('span');
              clbl.style.cssText='font-size:9px;font-weight:500;color:#fff;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;pointer-events:none;text-shadow:0 1px 1px rgba(0,0,0,0.3)';
              clbl.textContent=child.name+(child.area?' '+child.area:'')+(child.note?' '+child.note:'');
              cbar.appendChild(clbl);
              // バーが短い時は右外にラベル
              if(span<=3){
                const col2=document.createElement('div');
                col2.style.cssText=`position:absolute;top:2px;left:${span*_dw+3}px;font-size:9px;font-weight:500;color:#444;white-space:nowrap;pointer-events:none;z-index:3`;
                col2.textContent=child.name+(child.area?' '+child.area:'')+(child.note?' '+child.note:'');
                cbar.appendChild(col2);
              }
              sc.appendChild(cbar);
            });
            frag.appendChild(childRow);
          });
        }
      });
    }
  });

  const tbody=document.getElementById('ganttBody');
  tbody.innerHTML='';
  tbody.appendChild(frag);
  saveData();
}

// バードラッグ処理
document.addEventListener('mousemove',function(e){
  if(!barDrag.active)return;
  const days=getDays();
  // マウス位置からdi計算
  let di=null;
  const cells=document.querySelectorAll('td.day-cell');
  for(const cell of cells){
    const r=cell.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<r.right&&e.clientY>=r.top&&e.clientY<r.bottom){
      di=parseInt(cell.dataset.di);break;
    }
  }
  if(di===null)return;

  if(barDrag.isKouki){
    const site=sites.find(x=>x.id===barDrag.siteId);
    if(!site)return;
    const origSN=toN(parseD(barDrag.origStart));
    const origEN=toN(parseD(barDrag.origEnd));
    const origSi=days.findIndex(d=>toN(d)===origSN);
    const origEi=days.findIndex(d=>toN(d)===origEN);
    if(barDrag.type==='move'){
      const delta=di-barDrag.startMouseDi;
      const nsi=Math.max(0,Math.min(days.length-1,origSi+delta));
      const nei=Math.max(0,Math.min(days.length-1,origEi+delta));
      site.koukiStart=fmt(days[nsi]);site.koukiEnd=fmt(days[nei]);
    }else if(barDrag.type==='left'){
      const nsi=Math.max(0,Math.min(origEi,di));
      site.koukiStart=fmt(days[nsi]);
    }else{
      const nei=Math.max(Math.max(0,origSi),Math.min(days.length-1,di));
      site.koukiEnd=fmt(days[nei]);
    }
  }else{
    const site=sites.find(x=>x.id===barDrag.siteId);
    const proc=site&&site.processes.find(x=>x.id===barDrag.procId);
    if(!proc)return;
    const period=proc.periods[barDrag.periodIdx];
    if(!period)return;
    const origSN=toN(parseD(barDrag.origStart));
    const origEN=toN(parseD(barDrag.origEnd));
    const origSi=days.findIndex(d=>toN(d)===origSN);
    const origEi=days.findIndex(d=>toN(d)===origEN);
    if(barDrag.type==='move'){
      const delta=di-barDrag.startMouseDi;
      const nsi=Math.max(0,Math.min(days.length-1,origSi+delta));
      const nei=Math.max(0,Math.min(days.length-1,origEi+delta));
      period.startD=fmt(days[nsi]);period.endD=fmt(days[nei]);
    }else if(barDrag.type==='left'){
      const nsi=Math.max(0,Math.min(origEi,di));
      period.startD=fmt(days[nsi]);
    }else{
      const nei=Math.max(origSi,Math.min(days.length-1,di));
      period.endD=fmt(days[nei]);
    }
  }
  render();
});

document.addEventListener('mouseup',function(e){
  if(barDrag.active){
    barDrag.active=false;
    barDrag.isNew=false;
    saveData();
  }
});

// 物件・工程の並び替え
let sortDrag={active:false,siteId:null,procId:null,overProcId:null};
let siteDrag={active:false,siteId:null,overSiteId:null};

document.addEventListener('mousedown',function(e){
  const siteHandle=e.target.closest('.sort-handle-site');
  if(siteHandle){
    e.preventDefault();
    siteDrag={active:true,siteId:parseInt(siteHandle.dataset.site),overSiteId:null};
    siteHandle.closest('tr').classList.add('site-dragging');
    return;
  }
  const handle=e.target.closest('.sort-handle');
  if(handle){
    e.preventDefault();
    sortDrag={active:true,siteId:parseInt(handle.dataset.site),procId:parseInt(handle.dataset.proc),overProcId:null};
    handle.closest('tr').classList.add('sort-dragging');
    return;
  }
});

document.addEventListener('mousemove',function(e){
  if(barDrag.active)return;
  if(siteDrag.active){
    document.querySelectorAll('tr.site-drag-over').forEach(r=>r.classList.remove('site-drag-over'));
    const h=e.target.closest('.sort-handle-site');
    if(h){const sid=parseInt(h.dataset.site);if(sid!==siteDrag.siteId){siteDrag.overSiteId=sid;h.closest('tr').classList.add('site-drag-over');}}
    return;
  }
  if(sortDrag.active){
    document.querySelectorAll('tr.sort-over').forEach(r=>r.classList.remove('sort-over'));
    const h=e.target.closest(`.sort-handle[data-site="${sortDrag.siteId}"]`);
    if(h){const pid=parseInt(h.dataset.proc);if(pid!==sortDrag.procId){sortDrag.overProcId=pid;h.closest('tr').classList.add('sort-over');}}
    return;
  }
},true);

document.addEventListener('mouseup',function(e){
  if(barDrag.active)return;
  if(siteDrag.active){
    document.querySelectorAll('tr.site-dragging,tr.site-drag-over').forEach(r=>{r.classList.remove('site-dragging');r.classList.remove('site-drag-over');});
    if(siteDrag.overSiteId!==null&&siteDrag.overSiteId!==siteDrag.siteId){
      const fi=sites.findIndex(x=>x.id===siteDrag.siteId);
      const ti=sites.findIndex(x=>x.id===siteDrag.overSiteId);
      if(fi>=0&&ti>=0){const[m]=sites.splice(fi,1);sites.splice(ti,0,m);}
      render();
    }
    siteDrag={active:false,siteId:null,overSiteId:null};return;
  }
  if(sortDrag.active){
    document.querySelectorAll('tr.sort-dragging,tr.sort-over').forEach(r=>{r.classList.remove('sort-dragging');r.classList.remove('sort-over');});
    if(sortDrag.overProcId!==null&&sortDrag.overProcId!==sortDrag.procId){
      const site=sites.find(x=>x.id===sortDrag.siteId);
      if(site){
        const fi=site.processes.findIndex(p=>p.id===sortDrag.procId);
        const ti=site.processes.findIndex(p=>p.id===sortDrag.overProcId);
        if(fi>=0&&ti>=0){const[m]=site.processes.splice(fi,1);site.processes.splice(ti,0,m);}
      }
      render();
    }
    sortDrag={active:false,siteId:null,procId:null,overProcId:null};return;
  }
},true);

function toggleChildDone(procId,childId){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    const c=p.children.find(x=>x.id===childId);
    if(c){
      c.done=!c.done;
      // 全子項目完了で親も完了
      if(p.children.length>0&&p.children.every(x=>x.done))p.done=true;
      // 一つでも未完了なら親を未完了に戻す
      else if(!c.done)p.done=false;
    }
    break;
  }
  saveData();render();
}
function toggleChildren(procId){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.childCollapsed=!p.childCollapsed;break;}
  render();
}
function toggleSite(id){const s=sites.find(x=>x.id===id);if(s)s.collapsed=!s.collapsed;render();}
function expandAll(){sites.forEach(s=>s.collapsed=false);render();}
function collapseAll(){sites.forEach(s=>s.collapsed=true);render();}

      <span style="font-size:11px;color:#888">〜</span>
      <input type="date" value="${pd.endD||''}" onchange="updatePeriod(${procId||'null'},${i},'endD',this.value)" style="flex:1;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px">
      <button class="btn btn-sm btn-danger" onclick="delPeriod(${procId||'null'},${i})" style="flex-shrink:0">×</button>
    </div>`).join('');

  const children=p.children||[];
  const selOpts=`<option value="">-- 選択 --</option>`+masters.procNames.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  const childRows=children.map((c,i)=>`
    <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">
      <span style="font-size:11px;color:#aaa;flex-shrink:0">└</span>
      <select style="width:110px;flex-shrink:0;font-size:12px;padding:3px 4px;border:1px solid #ccc;border-radius:4px" onchange="updateChildFromSel(this,${procId||'null'},${i})">

        ${masters.procNames.map(v=>`<option value="${esc(v)}"${v===c.name?' selected':''}>${esc(v)}</option>`).join('')}

      <input value="${esc(c.area||'')}" placeholder="数量" onchange="updateChild(${procId||'null'},${i},'area',this.value)" style="width:50px;flex-shrink:0;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px">
      <input value="${esc(c.note||'')}" placeholder="備考" onchange="updateChild(${procId||'null'},${i},'note',this.value)" style="width:70px;flex-shrink:0;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px">
      <button class="btn btn-sm btn-danger" onclick="delChildInModal(${procId||'null'},${i})" style="flex-shrink:0">×</button>
    </div>`).join('');

  const hasChildren=children.length>0;

  document.getElementById('modalEl').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:440px;max-width:98vw">
    <h3>${isNew?'工程を追加':'工程を編集'}</h3>
    <div class="field"><label>工程名</label>
      <select id="p_name_sel" onchange="document.getElementById('p_name_inp').value=this.value" style="width:100%;font-size:13px;padding:5px 6px;border:1px solid #ccc;border-radius:6px">${nOpts}</select>
      <input type="hidden" id="p_name_inp" value="${esc(nval)}">
    </div>
    <div class="field"><label>工事項目 <span style="font-size:10px;color:#888">（任意・複数可）</span></label>
      <div id="childList">${childRows}</div>
      <button class="btn btn-sm btn-primary" style="margin-top:4px" onclick="addChildInModal(${procId||'null'})">＋ 工事項目を追加</button>

    </div>
    <div class="modal-btns">
      ${delBtn}
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveProc(${siteId},${procId||'null'})">${isNew?'追加':'保存'}</button>
    </div></div></div>`;

function updateChildFromSel(sel,procId,idx){
  const val=sel.value;
  if(!val)return;
  // 対応するテキスト入力にセット
  const row=sel.closest('div');
  const inp=row.querySelector('input[placeholder="工事項目名"]');
  if(inp)inp.value=val;
  updateChild(procId,idx,'name',val);
}

function updateChild(procId,idx,key,val){
  if(procId===null){
    const rows=document.querySelectorAll('#childList > div');
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    if(p.children[idx])p.children[idx][key]=val;break;
  }
  saveData();
}
function delChildInModal(procId,idx){
  if(procId===null){
    document.querySelectorAll('#childList > div')[idx]&&document.querySelectorAll('#childList > div')[idx].remove();
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.children.splice(idx,1);break;}
  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openProcModal(site.id,procId);
}
function addChildInModal(procId){
  const selOpts='<option value="">-- 選択 --</option>'+masters.procNames.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if(procId===null){
    const list=document.getElementById('childList');
    const div=document.createElement('div');
    div.style.cssText='display:flex;gap:4px;align-items:center;margin-bottom:4px';
    div.innerHTML=`<span style="font-size:11px;color:#aaa;flex-shrink:0">└</span>
      <select style="width:110px;flex-shrink:0;font-size:12px;padding:3px 4px;border:1px solid #ccc;border-radius:4px" onchange="const inp=this.nextElementSibling;if(inp&&this.value)inp.value=this.value">
        ${selOpts}
      </select>
      <input placeholder="工事項目名" class="new-child-name" style="flex:2;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px">
      <input placeholder="数量" class="new-child-area" style="width:60px;flex-shrink:0;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px">
      <button class="btn btn-sm btn-danger" onclick="this.parentNode.remove()" style="flex-shrink:0">×</button>`;
    list.appendChild(div);
    const areaField=document.getElementById('areaField');
    if(areaField)areaField.style.display='none';
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.children.push({id:nextCid++,name:'',area:''});break;}
  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openProcModal(site.id,procId);
}
function updatePeriod(procId,idx,key,val){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.periods[idx][key]=val;break;}
  saveData();
}
function delPeriod(procId,idx){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.periods.splice(idx,1);break;}
  saveData();
  // モーダルを再描画
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openProcModal(site.id,procId);
}
function addPeriodInModal(procId){
  if(procId===null){
    // 新規工程の場合はperiodListに行追加のみ
    const list=document.getElementById('periodList');
    const i=list.children.length;
    const div=document.createElement('div');
    div.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:4px';
    div.innerHTML=`<input type="date" style="flex:1;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px" class="new-period-start">
      <span style="font-size:11px;color:#888">〜</span>
      <input type="date" style="flex:1;font-size:12px;padding:4px;border:1px solid #ccc;border-radius:4px" class="new-period-end">
      <button class="btn btn-sm btn-danger" onclick="this.parentNode.remove()">×</button>`;
    list.appendChild(div);
    return;
  }
  for(const s of sites)for(const p of s.processes)if(p.id===procId){p.periods.push({startD:'',endD:''});break;}
  saveData();
  const site=sites.find(s=>s.processes.some(p=>p.id===procId));
  if(site)openProcModal(site.id,procId);
}

function selectColor(c){
  document.getElementById('p_color').value=c;
  document.querySelectorAll('.color-swatch').forEach(el=>{
    el.classList.toggle('selected',el.style.background===c||el.style.backgroundColor===c);
  });
}

function openChildModal(siteId,procId,childId){
  const site=sites.find(x=>x.id===siteId);
  const proc=site&&site.processes.find(x=>x.id===procId);
  if(!proc)return;
  const child=childId?proc.children.find(x=>x.id===childId):{name:'',area:''};
  const isNew=!childId;
  const delBtn=!isNew?`<button class="btn btn-danger" onclick="delChild(${procId},${childId})">削除</button>`:'';
  document.getElementById('modalEl').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${isNew?'子項目を追加':'子項目を編集'}</h3>
    <div class="field"><label>項目名</label><input id="c_name" value="${esc(child.name||'')}"></div>
    <div class="field"><label>数量・面積</label><input id="c_area" value="${esc(child.area||'')}"></div>
    <div class="field"><label>備考</label><input id="c_note" placeholder="品番・メモなど" value="${esc(child.note||'')}"></div>
    <div class="modal-btns">
      ${delBtn}
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveChild(${procId},${childId||'null'})">${isNew?'追加':'保存'}</button>
    </div></div></div>`;
}

function saveChild(procId,childId){
  const name=document.getElementById('c_name').value.trim();if(!name)return;
  const area=document.getElementById('c_area').value.trim();
  const note=document.getElementById('c_note').value.trim();
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    if(childId===null){p.children.push({id:nextCid++,name,area,note});}
    else{const c=p.children.find(x=>x.id===childId);if(c)Object.assign(c,{name,area,note});}
    break;
  }
  closeModal();
}

function delChild(procId,childId){
  for(const s of sites)for(const p of s.processes)if(p.id===procId){
    p.children=p.children.filter(x=>x.id!==childId);break;
  }
  closeModal();
}

function closeModal(){document.getElementById('modalEl').innerHTML='';render();}

function saveSite(id){
  const name=document.getElementById('s_name').value.trim();if(!name)return;
  const addr=document.getElementById('s_addr').value.trim();
  const client=document.getElementById('s_client_sel').value==='__custom__'?document.getElementById('s_client_inp').value.trim():document.getElementById('s_client_sel').value;
  const dropboxUrl=document.getElementById('s_dropbox').value.trim();
  const keyLocation=document.getElementById('s_key').value.trim();
  const koukiStart=document.getElementById('s_kouki_start').value;
  const koukiEnd=document.getElementById('s_kouki_end').value;
  if(id===null)sites.push({id:nextSid++,name,addr,client,dropboxUrl,keyLocation,collapsed:false,koukiStart,koukiEnd,processes:[]});
  else{const s=sites.find(x=>x.id===id);if(s)Object.assign(s,{name,addr,client,dropboxUrl,keyLocation,koukiStart,koukiEnd});}
  closeModal();
}
function delSite(id){if(!confirm('削除しますか？'))return;sites=sites.filter(x=>x.id!==id);closeModal();}

function saveProc(siteId,procId){
  const name=(document.getElementById('p_name_sel').value||document.getElementById('p_name_inp').value).trim();if(!name)return;
  const person=(document.getElementById('p_person_inp').value||document.getElementById('p_person_sel').value).trim();
  const area=document.getElementById('p_area').value.trim();
  const color=document.getElementById('p_color').value;
  const site=sites.find(x=>x.id===siteId);if(!site)return;

  // 新規子項目をchildListから収集
  const newChildren=[];
  document.querySelectorAll('#childList > div').forEach(row=>{
    const nm=row.querySelector('.new-child-name');
    const ar=row.querySelector('.new-child-area');
    if(nm&&nm.value.trim())newChildren.push({id:nextCid++,name:nm.value.trim(),area:ar?ar.value.trim():''});
  });

  if(procId===null){
    const periods=[];
    document.querySelectorAll('#periodList > div').forEach(row=>{
      const inputs=row.querySelectorAll('input[type=date]');
      if(inputs.length>=2)periods.push({startD:inputs[0].value,endD:inputs[1].value});
    });
    site.processes.push({id:nextPid++,name,person,area,periods,done:false,color,children:newChildren});
  }else{
    const p=site.processes.find(x=>x.id===procId);
    if(p){
      Object.assign(p,{name,person,area,color});
      if(newChildren.length>0)p.children=[...p.children,...newChildren];
    }
  }
  closeModal();
}
function delProc(siteId,procId){
  const site=sites.find(x=>x.id===siteId);if(!site)return;
  site.processes=site.processes.filter(x=>x.id!==procId);closeModal();
}

// マスター
function openMasterModal(){
  function listHtml(arr,key){
    if(!arr.length)return `<div style="font-size:11px;color:#aaa;padding:4px 0">未登録</div>`;
    return arr.map((v,i)=>`<div class="master-item" draggable="true"
      ondragstart="masterDragStart(event,'${key}',${i})"
      ondragover="event.preventDefault();this.style.borderTop='2px solid #4A90D9'"
      ondragleave="this.style.borderTop=''"
      ondrop="masterDrop(event,'${key}',${i});this.style.borderTop=''">
      <span style="cursor:grab;color:#bbb;padding-right:4px">⠿</span>
      <input value="${esc(v)}" style="flex:1;font-size:12px;padding:2px 6px;border-radius:4px;border:1px solid #ccc;height:24px" onchange="editMaster('${key}',${i},this.value)">
      <button onclick="delMaster('${key}',${i})">削除</button>
    </div>`).join('');
  }
  document.getElementById('modalEl').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:400px">
    <h3>マスター設定</h3>
    <div class="master-section"><h4>元受会社</h4>
      <div class="master-list">${listHtml(masters.clients,'clients')}</div>
      <div class="master-add"><input id="mi_client" placeholder="会社名を追加"><button onclick="addMaster('clients','mi_client')">追加</button></div>
    </div>
    <div class="master-section"><h4>担当者・業者</h4>
      <div class="master-list">${listHtml(masters.persons,'persons')}</div>
      <div class="master-add"><input id="mi_person" placeholder="担当者・業者名を追加"><button onclick="addMaster('persons','mi_person')">追加</button></div>
    </div>
    <div class="master-section"><h4>工事項目</h4>
      <div class="master-list">${listHtml(masters.procNames,'procNames')}</div>
      <div class="master-add"><input id="mi_procName" placeholder="工事項目を追加"><button onclick="addMaster('procNames','mi_procName')">追加</button></div>
    </div>
    <div class="modal-btns"><button class="btn" onclick="closeModal()">閉じる</button></div>
    </div></div>`;
}
let _masterDrag={key:null,fromIdx:null};
function masterDragStart(e,key,idx){_masterDrag={key,fromIdx:idx};e.dataTransfer.effectAllowed='move';}
function masterDrop(e,key,toIdx){
  if(_masterDrag.key!==key||_masterDrag.fromIdx===null)return;
  const arr=masters[key];
  const[moved]=arr.splice(_masterDrag.fromIdx,1);
  arr.splice(toIdx,0,moved);
  saveMasters();openMasterModal();
}
function editMaster(key,idx,val){val=val.trim();if(!val)return;masters[key][idx]=val;saveMasters();}
function addMaster(key,inputId){
  const v=document.getElementById(inputId).value.trim();if(!v)return;
  if(!masters[key].includes(v))masters[key].push(v);
  saveMasters();openMasterModal();
}
function delMaster(key,idx){masters[key].splice(idx,1);saveMasters();openMasterModal();}

function exportCSV(){
  const rows=[['物件名','所在地','元受','工程名','担当者','面積','開始日','終了日','完了']];
  sites.forEach(s=>s.processes.forEach(p=>(p.periods||[]).forEach(pd=>rows.push([s.name,s.addr,s.client,p.name,p.person,p.area,pd.startD,pd.endD,p.done?'完了':'']))));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download='工程表_'+fmt(new Date())+'.csv';a.click();
}

// タッチ対応（長押しで完了切替）
let _lpt=null,_tmv=false;
document.addEventListener('touchstart',function(e){
  _tmv=false;
  const bar=e.target.closest('[data-proc-id]');
  if(bar){
    const pid=parseInt(bar.dataset.procId),sid=parseInt(bar.dataset.siteId);
    _lpt=setTimeout(()=>{if(!_tmv)showDonePopup(sid,pid,e.touches[0].clientX,e.touches[0].clientY);},500);
  }
  const procTd=e.target.closest('td.day-cell[data-proc]');
  if(procTd){barDrag={active:true,type:'move',isKouki:false,siteId:parseInt(procTd.dataset.site),procId:parseInt(procTd.dataset.proc),periodIdx:0,startMouseDi:parseInt(procTd.dataset.di),origStart:'',origEnd:''};return;}
},{passive:true});
document.addEventListener('touchmove',function(){_tmv=true;if(_lpt){clearTimeout(_lpt);_lpt=null;}},{passive:true});
document.addEventListener('touchend',function(e){
  if(_lpt){clearTimeout(_lpt);_lpt=null;}
  if(barDrag.active){barDrag.active=false;barDrag.isNew=false;saveData();}
},{passive:true});

function showDonePopup(sid,pid,cx,cy){
  const site=sites.find(s=>s.id===sid);
  const proc=site&&site.processes.find(p=>p.id===pid);
  if(!proc)return;
  const old=document.getElementById('donePopup');if(old)old.remove();
  const pop=document.createElement('div');
  pop.id='donePopup';
  pop.style.cssText='position:fixed;z-index:2000;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);padding:8px 0;min-width:180px;left:'+Math.min(cx,window.innerWidth-200)+'px;top:'+Math.min(cy,window.innerHeight-120)+'px';
  const nm=document.createElement('div');nm.style.cssText='padding:8px 16px 6px;font-size:12px;font-weight:600;color:#0C447C;border-bottom:1px solid #eee';nm.textContent=proc.name;pop.appendChild(nm);
  // 子項目一覧
  const ch=proc.children||[];
  if(ch.length>0){
    const cl2=document.createElement('div');cl2.style.cssText='padding:6px 16px;border-bottom:1px solid #eee';
    cl2.innerHTML=ch.map(c=>'<div style="font-size:11px;color:#555;padding:2px 0">└ '+esc(c.name)+(c.area?' <span style="color:#aaa">'+esc(c.area)+'</span>':'')+'</div>').join('');
    pop.appendChild(cl2);
  }
  if(!proc.done){const d=document.createElement('div');d.style.cssText='padding:12px 16px;font-size:14px;cursor:pointer;color:#1D9E75';d.textContent='✓ 完了にする';d.onclick=()=>toggleDone(pid);pop.appendChild(d);}
  if(proc.done){const d=document.createElement('div');d.style.cssText='padding:12px 16px;font-size:14px;cursor:pointer;color:#E74C3C';d.textContent='↩ 未完了に戻す';d.onclick=()=>toggleDone(pid);pop.appendChild(d);}
  const cl=document.createElement('div');cl.style.cssText='padding:10px 16px;font-size:13px;cursor:pointer;color:#aaa;border-top:1px solid #eee';cl.textContent='キャンセル';cl.onclick=()=>pop.remove();pop.appendChild(cl);
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('touchstart',()=>{const p=document.getElementById('donePopup');if(p)p.remove();},{once:true}),100);
}

if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
  const sp=document.createElement('style');
  sp.textContent=
    '.col-info{width:100px!important;min-width:100px!important}'+
    '.day-col{width:34px!important;min-width:34px!important}'+
    '.btn-sm{display:none!important}'+
    '.chk{display:none!important}'+
    '.sort-handle{display:none!important}'+
    '.sort-handle-site{display:none!important}'+
    '.badge-nd,.badge-warn,.badge-procwarn,.badge-nodate{display:none!important}'+
    '.site-sub{display:none!important}.site-key{display:block!important;font-size:9px;color:#555}'+
    '.site-name{font-size:10px}'+
    '.proc-name{font-size:10px}'+
    '.proc-meta{max-width:100%!important;font-size:9px;color:#888;display:block!important}';
  document.head.appendChild(sp);
  // スマホでは担当者のみ表示（数量を非表示）
  const _origRender=render;
  window.render=function(){
    _origRender();
    document.querySelectorAll('.proc-meta').forEach(el=>{
      const txt=el.textContent;
      if(txt.includes('·')){el.textContent=txt.split('·')[0].trim();}
    });
  };
}

loadData();
